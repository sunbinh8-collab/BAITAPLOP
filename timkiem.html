<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tìm kiếm - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
    <style>
      /* --- HỆ THỐNG DESIGN SYSTEM ĐỒNG BỘ --- */
      :root {
        --primary-color: #ff4757;
        --primary-hover: #ee3848;
        --secondary-color: #2ed573;
        --text-color: #2f3542;
        --text-muted: #747d8c;
        --border-color: #e4e7eb;
        --bg-light: #f1f2f6;
        --radius-lg: 16px;
        --radius-md: 10px;
        --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
        --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
        --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      body {
        background-color: #f7f9fa;
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* === SITE HEADER === */
      .site-header {
        background: #fff;
        box-shadow: var(--shadow-sm);
        padding: 16px 0;
        position: sticky; top: 0; z-index: 100;
      }
      .header-inner { display: flex; justify-content: space-between; align-items: center; }
      .logo { font-size: 26px; font-weight: 800; color: var(--primary-color); text-decoration: none; }
      .main-nav a {
        color: var(--text-color); text-decoration: none; margin-right: 24px; font-weight: 600; font-size: 0.95rem; transition: var(--transition);
      }
      .main-nav a:hover, .main-nav a.active { color: var(--primary-color); }
      .cart-btn {
        background: var(--primary-color); color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 30px; font-weight: 700; box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
      }

      /* === SEARCH HERO LAYOUT === */
      .search-hero {
        background: linear-gradient(135deg, #2f3542, #57606f);
        color: #fff;
        padding: 50px 0;
        text-align: center;
        border-bottom-left-radius: var(--radius-lg);
        border-bottom-right-radius: var(--radius-lg);
        margin-bottom: 40px;
      }
      .search-hero h1 { font-size: 2.2rem; font-weight: 800; margin: 0 0 10px 0; }
      .search-hero p { font-size: 1rem; opacity: 0.9; margin: 0 0 24px 0; }

      .search-input-box {
        width: 100%;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        border: 2px solid transparent;
        font-size: 1rem;
        outline: none;
        box-sizing: border-box;
        transition: var(--transition);
      }
      .search-input-box:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.15);
      }

      /* === LƯỚI KẾT QUẢ SẢN PHẨM === */
      .products h2 {
        font-size: 1.4rem; font-weight: 800; margin-bottom: 24px;
        border-left: 4px solid var(--primary-color); padding-left: 10px;
      }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
      .product { background: #fff; border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); position: relative; transition: var(--transition); border: 1px solid var(--border-color); display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
      .product:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
      .product img { width: 100%; max-width: 180px; aspect-ratio: 1/1; object-fit: cover; border-radius: var(--radius-md); margin: 0 auto 14px auto; display: block; }
      .product-info-wrap { text-align: center; margin-top: 10px; }
      .product h3 { font-size: 0.95rem; margin: 0 0 6px 0; font-weight: 600; }
      .product h3 a { color: var(--text-color); text-decoration: none; }
      .product h3 a:hover { color: var(--primary-color); }
      .product .price { font-size: 1.05rem; color: var(--primary-color); font-weight: 700; margin: 0; }
      
      .btn {
        display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; font-size: 0.95rem; font-weight: 700; border-radius: var(--radius-md); border: 1px solid var(--border-color); cursor: pointer; transition: var(--transition); text-decoration: none;
      }
      .btn.primary { background: var(--primary-color); color: #fff; border: none; }
      .btn.primary:hover { background: var(--primary-hover); }

      .product .add-to-cart { width: 100%; background: #fff; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 10px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; }
      .product .add-to-cart:hover { background: var(--primary-color); color: #fff; }
      .product-badge { position: absolute; top: 22px; left: 22px; background: #ff4757; color: white; padding: 2px 6px; font-size: 0.7rem; font-weight: 600; border-radius: 4px; z-index: 4; }

      /* === FOOTER === */
      .site-footer { background-color: #ffffff; border-top: 1px solid var(--border-color); padding: 40px 0 20px 0; margin-top: 80px; }
      
      /* === TOAST === */
      .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(47, 53, 66, 0.95); color: #fff; padding: 12px 24px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 9999; font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; opacity: 0; }
      .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
      .toast-icon { background: var(--secondary-color); width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
    </style>
  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html" id="navLoginLink">Đăng nhập</a>
          <a href="dangky.html" id="navRegisterLink">Đăng ký</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html" id="headerCartBtn">Giỏ (0)</a>
      </div>
    </header>

    <section class="search-hero">
      <div class="container">
        <h1>Tìm kiếm sản phẩm</h1>
        <p>Tìm nhanh sản phẩm yêu thích và thêm ngay vào giỏ hàng.</p>
        <form id="searchForm" style="max-width: 680px; margin: 0 auto; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
          <input id="searchInput" class="search-input-box" type="search" placeholder="Nhập tên sản phẩm hoặc từ khóa..." />
          <button class="btn primary" type="submit" style="min-width: 120px;">Tìm kiếm</button>
        </form>
      </div>
    </section>

    <main class="container">
      <section class="products">
        <h2>Kết quả tìm kiếm</h2>
        <div class="grid" id="resultGrid"></div>
      </section>
    </main>

    <div class="footer-bottom" style="border-top: 1px solid var(--border-color); margin-top: 30px; padding-top: 20px; text-align: center; color: var(--text-muted);">
          <div style="margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px;">
            © 2026 <span style="color: var(--primary-color); font-weight: 600;">MiniShop</span>. All rights reserved. Powered by HTML5 & CSS3.
          </div>
          <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <img src="images/payment-methods.png" alt="Phương thức thanh toán" style="max-height: 24px; opacity: 0.6; filter: grayscale(100%);" onerror="this.style.display='none'">
          </div>
        </div>

    <script>
      // Hệ thống đồng bộ danh mục 20 sản phẩm hoàn chỉnh của hệ thống
      var products = [
        { id: 1, title: "Áo thun Basic Unisex Nam Nữ", price: 199000, img: "images/products/aothunden.jpg" },
        { id: 2, title: "Quần Jean Slimfit Nam", price: 299000, img: "images/products/quanjean.jpg" },
        { id: 3, title: "Chân váy ngắn đũi nữ", price: 349000, img: "images/products/bonuday.jpeg" },
        { id: 4, title: "Áo sơ mi lụa nữ cổ bẻ", price: 249000, img: "images/products/somi.jpg" },
        { id: 5, title: "Mũ Beanie phong cách Hàn Quốc", price: 89000, img: "images/products/images.jpg" },
        { id: 6, title: "Áo khoác gió Bomber Nam", price: 499000, img: "images/products/quanaobongchuyen.jpg" },
        { id: 7, title: "Giày Sneaker Sport thể thao", price: 599000, img: "images/products/images.jpg" },
        { id: 8, title: "Túi đeo chéo Canvas thời trang", price: 259000, img: "images/products/bonuday.jpeg" },
        { id: 9, title: "Đồng hồ Classic Quartz", price: 1290000, img: "images/products/quanjean.jpg" },
        { id: 10, title: "Áo Polo Nam phối cổ cá tính", price: 279000, img: "images/products/aothunden.jpg" },
        { id: 11, title: "Quần Short Kaki Casual Nam", price: 189000, img: "images/products/quanjean.jpg" },
        { id: 12, title: "Đầm hoa nhí dáng xòe tiểu thư nữ", price: 389000, img: "images/products/bonuday.jpeg" },
        { id: 13, title: "Áo Hoodie nỉ ngoại Unisex", price: 350000, img: "images/products/quanaobongchuyen.jpg" },
        { id: 14, title: "Ví da nam cầm tay cao cấp", price: 450000, img: "images/products/images.jpg" },
        { id: 15, title: "Kính mát thời trang chống UV", price: 150000, img: "images/products/images.jpg" },
        { id: 16, title: "Quần Tây Âu ống đứng Nam", price: 320000, img: "images/products/quanjean.jpg" },
        { id: 17, title: "Áo Cardigan dệt kim nữ", price: 299000, img: "images/products/somi.jpg" },
        { id: 18, title: "Tất Vớ cổ cao cotton gọn chân", price: 95000, img: "images/products/images.jpg" },
        { id: 19, title: "Thắt lưng da khóa tự động Nam", price: 220000, img: "images/products/quanjean.jpg" },
        { id: 20, title: "Dép quai ngang bánh mì", price: 135000, img: "images/products/images.jpg" }
      ];

      function formatVND(n) {
        return "₫" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function getQuery(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
      }

      function showToast(message) {
        var oldToast = document.querySelector(".toast-msg");
        if (oldToast) oldToast.remove();
        var toast = document.createElement("div");
        toast.className = "toast-msg";
        toast.innerHTML = '<span class="toast-icon">✓</span> ' + message;
        document.body.appendChild(toast);
        setTimeout(function () { toast.classList.add("show"); }, 50);
        setTimeout(function () { toast.classList.remove("show"); setTimeout(function () { toast.remove(); }, 300); }, 3000);
      }

      function updateCartCount() {
        var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
        var count = cart.reduce(function (sum, item) { return sum + (item.qty || 0); }, 0);
        var btn = document.getElementById("headerCartBtn");
        if (btn) btn.textContent = "Giỏ (" + count + ")";
      }

      function renderResults(query) {
        var grid = document.getElementById("resultGrid");
        grid.innerHTML = "";
        var normalized = query.trim().toLowerCase();
        
        var matched = normalized
          ? products.filter(function (p) { return p.title.toLowerCase().indexOf(normalized) !== -1; })
          : products;

        if (!matched.length) {
          grid.innerHTML = `<div style="grid-column:1/-1; padding:24px; background:#fff; border-radius:12px; box-shadow:var(--shadow-sm); font-weight:600; color:var(--text-muted);">Không tìm thấy sản phẩm phù hợp với "${query}".</div>`;
          return;
        }

        matched.forEach(function (p) {
          var card = document.createElement("article");
          card.className = "product";
          card.innerHTML = `
            <span class="product-badge">Mới</span>
            <a class="product-link" href="chitietsanpham.html?id=${p.id}">
              <img src="${p.img}" alt="${p.title}" loading="lazy">
            </a>
            <div class="product-info-wrap">
              <h3><a class="product-link" href="chitietsanpham.html?id=${p.id}">${p.title}</a></h3>
              <p class="price">${formatVND(p.price)}</p>
            </div>
            <div class="actions" style="margin-top:12px;">
              <button class="add-to-cart" data-id="${p.id}">Thêm vào giỏ</button>
            </div>
          `;
          grid.appendChild(card);
        });

        // Xử lý Sự kiện Thêm hàng vào giỏ
        document.querySelectorAll(".product .add-to-cart").forEach(function (button) {
          button.addEventListener("click", function () {
            var id = parseInt(this.getAttribute("data-id"));
            var product = products.find(function (item) { return item.id === id; });
            if (!product) return;
            
            var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
            var existing = cart.find(function (item) { return item.id === product.id; });
            
            if (existing) {
              existing.qty += 1;
            } else {
              cart.push({ id: product.id, title: product.title, price: product.price, qty: 1, img: product.img, size: "M", color: "Mặc định" });
            }
            
            localStorage.setItem("mini_cart", JSON.stringify(cart));
            updateCartCount();
            showToast('Đã thêm thành công "' + product.title + '" vào giỏ!');
          });
        });
      }

      document.getElementById("searchForm").addEventListener("submit", function (event) {
        event.preventDefault();
        var term = document.getElementById("searchInput").value;
        history.replaceState(null, "", "?q=" + encodeURIComponent(term));
        renderResults(term);
      });

      // --- ĐỒNG BỘ TRẠNG THÁI ĐĂNG NHẬP TRÊN HEADER ---
      var sessionUser = JSON.parse(localStorage.getItem("currentUser") || "null");
      if (sessionUser) {
        var navLogin = document.getElementById("navLoginLink");
        var navRegister = document.getElementById("navRegisterLink");
        
        if (navLogin) { navLogin.textContent = sessionUser.name; navLogin.href = "taikhoan.html"; }
        if (navRegister) {
          navRegister.textContent = "Đăng xuất"; navRegister.href = "#";
          navRegister.addEventListener("click", function (e) {
            e.preventDefault(); localStorage.removeItem("currentUser"); localStorage.removeItem("mini_profile"); window.location.reload();
          });
        }
      }

      var initialQuery = getQuery("q");
      document.getElementById("searchInput").value = initialQuery;
      renderResults(initialQuery);
      updateCartCount();
    </script>
  </body>
</html>
