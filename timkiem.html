<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tìm kiếm - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a class="active" href="timkiem.html">Tìm kiếm</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html">Giỏ (0)</a>
      </div>
    </header>
    <script src="js/common.js"></script>

    <main class="container">
      <section class="hero">
        <div>
          <h1>Tìm kiếm sản phẩm</h1>
          <p>Tìm nhanh sản phẩm yêu thích và thêm ngay vào giỏ hàng.</p>
          <form
            id="searchForm"
            style="
              max-width: 680px;
              margin: 0 auto;
              display: flex;
              gap: 10px;
              flex-wrap: wrap;
              justify-content: center;
            "
          >
            <input
              id="searchInput"
              type="search"
              placeholder="Nhập tên sản phẩm hoặc từ khóa"
              style="
                flex: 1;
                min-width: 220px;
                padding: 14px 16px;
                border-radius: 10px;
                border: 2px solid #eee;
                font-size: 1rem;
              "
            />
            <button class="btn primary" type="submit">Tìm kiếm</button>
          </form>
        </div>
      </section>

      <section class="products">
        <h2>Kết quả tìm kiếm</h2>
        <div class="grid" id="resultGrid"></div>
      </section>
    </main>

    <script>
      var products = [
        {
          id: 1,
          title: "Áo thun basic",
          price: 199000,
          img: "images/products/aothunden.jpg",
        },
        {
          id: 2,
          title: "Quần jean",
          price: 299000,
          img: "images/products/quanjean.jpg",
        },
        {
          id: 3,
          title: "Váy nữ",
          price: 349000,
          img: "images/products/bonuday.jpeg",
        },
        {
          id: 4,
          title: "Áo sơ mi",
          price: 249000,
          img: "images/products/somi.jpg",
        },
        {
          id: 5,
          title: "Mũ thời trang",
          price: 89000,
          img: "images/products/images.jpg",
        },
        {
          id: 6,
          title: "Áo khoác",
          price: 499000,
          img: "images/products/quanaobongchuyen.jpg",
        },
        {
          id: 7,
          title: "Giày thể thao",
          price: 599000,
          img: "images/products/images.jpg",
        },
        {
          id: 8,
          title: "Túi xách",
          price: 259000,
          img: "images/products/bonuday.jpeg",
        },
        {
          id: 9,
          title: "Đồng hồ",
          price: 1290000,
          img: "images/products/quanjean.jpg",
        },
      ];

      function formatVND(n) {
        return "₫" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function getQuery(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
      }

      function updateCartCount() {
        var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
        var count = cart.reduce(function (sum, item) {
          return sum + (item.qty || 0);
        }, 0);
        var btn = document.querySelector(".cart-btn");
        if (btn) btn.textContent = "Giỏ (" + count + ")";
      }

      function renderResults(query) {
        var grid = document.getElementById("resultGrid");
        grid.innerHTML = "";
        var normalized = query.trim().toLowerCase();
        var matched = normalized
          ? products.filter(function (p) {
              return p.title.toLowerCase().indexOf(normalized) !== -1;
            })
          : products;

        if (!matched.length) {
          grid.innerHTML =
            '<div style="grid-column:1/-1;padding:24px;background:#fff;border-radius:12px;box-shadow:var(--shadow-sm);">Không tìm thấy sản phẩm phù hợp với "' +
            query +
            '".</div>';
          return;
        }

        matched.forEach(function (p) {
          var card = document.createElement("article");
          card.className = "product";
          card.innerHTML =
            '<a class="product-link" href="chitietsanpham.html?id=' +
            p.id +
            '"><img src="' +
            p.img +
            '" alt="' +
            p.title +
            '" loading="lazy" decoding="async" width="400" height="400"></a>' +
            '<h3><a class="product-link" href="chitietsanpham.html?id=' +
            p.id +
            '">' +
            p.title +
            "</a></h3>" +
            '<p class="price">' +
            formatVND(p.price) +
            "</p>" +
            '<div class="actions"><button class="btn" data-id="' +
            p.id +
            '">Thêm vào giỏ</button></div>';
          grid.appendChild(card);
        });

        document.querySelectorAll(".product .btn").forEach(function (button) {
          button.addEventListener("click", function () {
            var id = parseInt(this.getAttribute("data-id"));
            var product = products.find(function (item) {
              return item.id === id;
            });
            if (!product) return;
            var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
            var existing = cart.find(function (item) {
              return item.id === product.id;
            });
            if (existing) existing.qty += 1;
            else
              cart.push({
                id: product.id,
                title: product.title,
                price: product.price,
                qty: 1,
              });
            localStorage.setItem("mini_cart", JSON.stringify(cart));
            updateCartCount();
            showToast('Đã thêm "' + product.title + '" vào giỏ', "success");
          });
        });
      }

      document
        .getElementById("searchForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          var term = document.getElementById("searchInput").value;
          if (term) {
            history.replaceState(null, "", "?q=" + encodeURIComponent(term));
          }
          renderResults(term);
        });

      var initialQuery = getQuery("q");
      document.getElementById("searchInput").value = initialQuery;
      renderResults(initialQuery);
      updateCartCount();
    </script>
  </body>
</html>
