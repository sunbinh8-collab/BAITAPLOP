<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lý nhân viên</title>
    <link rel="stylesheet" href="../css-qly/quanlynhanvien.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="sidebar">
        <div class="brand">MiniShop Admin</div>
        <nav>
          <a href="../index-admin.html">Trang chủ</a>
          <a href="quanlysanpham.html">Quản lý sản phẩm</a>
          <a href="quanlydonhang.html">Quản lý đơn hàng</a>
          <a href="quanlykhachhang.html">Quản lý khách hàng</a>
          <a href="quanlynhanvien.html" class="active">Quản lý nhân viên</a>
          <a href="quanlydoanhthu.html">Quản lý doanh thu</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Quản lý nhân viên</h1>
            <p>Danh sách nhân viên và thông tin công việc</p>
          </div>
        </header>

        <section class="panel">
          <div class="panel-header">
            <h2>Thêm / sửa nhân viên</h2>
          </div>
          <form id="staffForm" class="staff-form">
            <input id="staffId" type="hidden" />
            <input id="name" type="text" placeholder="Họ và tên" required />
            <input id="role" type="text" placeholder="Chức vụ" required />
            <input id="email" type="email" placeholder="Email" required />
            <input id="phone" type="text" placeholder="Số điện thoại" />
            <input id="joinDate" type="text" placeholder="Ngày vào làm" />
            <select id="status">
              <option value="active">Đang làm việc</option>
              <option value="off">Nghỉ phép</option>
            </select>
            <select id="permission">
              <option value="staff">Nhân viên</option>
              <option value="admin">Admin</option>
            </select>
            <input id="photo" type="file" accept="image/*" />
            <button type="submit">Lưu nhân viên</button>
            <button type="button" id="cancelEdit" class="secondary">Hủy</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Bộ lọc</h2>
          </div>
          <div class="filters">
            <input
              id="searchInput"
              type="text"
              placeholder="Tìm theo tên hoặc chức vụ"
            />
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Danh sách nhân viên</h2>
          </div>
          <div id="staffList" class="staff-list"></div>
        </section>
      </main>
    </div>

    <script src="../js-qly/quanhlynhanvien.js"></script>
  </body>
</html>
