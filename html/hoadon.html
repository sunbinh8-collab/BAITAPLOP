<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đơn hàng - MiniShop</title>
    <link rel="stylesheet" href="../css/minishop.css" />
    <style>
      .confirm-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 1100;
      }
      .confirm-modal-overlay.active {
        display: flex;
      }
      .confirm-modal {
        width: min(520px, 100%);
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.2);
      }
      .confirm-modal h3 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .confirm-modal p {
        margin: 0 0 12px;
        color: var(--muted);
      }
      .confirm-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html">Đăng nhập</a>
          <a href="dangky.html">Đăng ký</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html">Giỏ (0)</a>
      </div>
    </header>

    <main class="container">
      <div class="account-wrap">
        <aside class="account-aside">
          <div class="aside-card">
            <nav>
              <a href="taikhoan.html" data-panel="profile">Hồ sơ</a>
              <a href="hoadon.html" class="active" data-panel="orders"
                >Đơn hàng</a
              >
              <a href="diachi.html" data-panel="addresses">Địa chỉ</a>
              <a href="phuongthucthanhtoan.html" data-panel="payments"
                >Phương thức thanh toán</a
              >
              <a href="yeuthich.html" data-panel="favorites">Yêu thích</a>
              <a href="caidat.html" data-panel="settings">Cài đặt</a>
              <a id="manageLink" href="../admin/html_qly/quanly.html" style="display: none"
                >Quản lý</a
              >
              <a id="logoutLink" href="dangnhap.html">Đăng xuất</a>
            </nav>
          </div>
        </aside>

        <section class="account-main">
          <div class="account-panel">
            <h2>Đơn hàng</h2>
            <div id="ordersList" style="display: grid; gap: 12px"></div>
          </div>
        </section>
      </div>
    </main>

    <!-- Cancel confirmation modal -->
    <div id="cancelModal" class="confirm-modal-overlay" aria-hidden="true">
      <div
        class="confirm-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="cancelTitle"
      >
        <h3 id="cancelTitle">Xác nhận hủy đơn</h3>
        <p id="cancelMessage">Bạn có chắc chắn muốn hủy đơn?</p>
        <div class="confirm-actions">
          <button id="cancelDismiss" class="btn">Hủy</button>
          <button id="cancelConfirm" class="btn danger">Xác nhận hủy</button>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>© 2026 MiniShop. All rights reserved.</div>
        <div class="footer-links">
          <a href="lienhe.html">Hỗ trợ</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="thanhtoan.html">Thanh toán</a>
        </div>
      </div>
    </footer>

    <script src="../js/common.js"></script>
    <script>
      function formatVND(n) {
        return "₫" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      // Use global updateCartCount from `js/common.js`
      function refreshCartCount() {
        if (window.updateCartCount) return window.updateCartCount();
      }

      function getOrders() {
        return JSON.parse(localStorage.getItem("mini_orders") || "[]");
      }

      function renderOrders() {
        var container = document.getElementById("ordersList");
        var orders = getOrders();

        if (!orders.length) {
          container.innerHTML =
            '<div style="padding:16px;border:1px dashed #d9ecff;border-radius:12px;color:var(--muted);">Chưa có đơn hàng nào.</div>';
          return;
        }

        container.innerHTML = orders
          .map(function (order) {
            var itemsText = order.items
              .slice(0, 2)
              .map(function (item) {
                return item.title;
              })
              .join(", ");
            var extra =
              order.items.length > 2
                ? " và hơn " + (order.items.length - 2) + " sản phẩm"
                : "";
            var paymentLabel =
              order.paymentMethod === "cod"
                ? "Thanh toán khi nhận hàng"
                : order.paymentMethod === "bank"
                  ? "Chuyển khoản"
                  : order.paymentMethod === "momo"
                    ? "Ví MoMo"
                    : "Thẻ tín dụng";

            var _st = (order.status || "").toString().toLowerCase();
            var _canCancel =
              _st.indexOf("đang") !== -1 || _st.indexOf("processing") !== -1;

            return (
              '<div style="border:1px solid #e6e6e6;border-radius:14px;padding:16px;background:#fff;">' +
              '<div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center">' +
              "<div><strong>Mã đơn: MSH-" +
              order.id +
              '</strong><div style="color:var(--muted);font-size:0.95rem;margin-top:4px">' +
              order.createdAt +
              "</div></div>" +
              '<div style="display:flex;align-items:center;gap:12px">' +
              '<span style="padding:6px 10px;border-radius:999px;background:#f2f8ff;color:#1d4ed8;font-size:0.9rem">' +
              order.status +
              "</span>" +
              (_canCancel
                ? '<button class="btn danger cancel-order" data-id="' +
                  order.id +
                  '">Hủy đơn</button>'
                : "") +
              "</div>" +
              "</div>" +
              '<div style="margin-top:12px;color:var(--muted)">' +
              itemsText +
              extra +
              "</div>" +
              '<div style="margin-top:10px;color:var(--muted);line-height:1.5">' +
              "<div><strong>Người nhận:</strong> " +
              (order.recipient && order.recipient.name
                ? order.recipient.name
                : "Chưa cập nhật") +
              "</div>" +
              "<div><strong>SĐT:</strong> " +
              (order.recipient && order.recipient.phone
                ? order.recipient.phone
                : "Chưa cập nhật") +
              "</div>" +
              "<div><strong>Địa chỉ:</strong> " +
              (order.recipient && order.recipient.address
                ? order.recipient.address
                : "Chưa cập nhật") +
              "</div>" +
              "</div>" +
              '<div style="margin-top:10px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center">' +
              "<span>Phương thức: " +
              paymentLabel +
              "</span>" +
              "<strong>" +
              formatVND(order.total) +
              "</strong>" +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        // attach cancel handlers that open the modal
        container.querySelectorAll(".cancel-order").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var id = this.getAttribute("data-id");
            if (!id) return;
            pendingCancelId = id;
            var msg = "Bạn có chắc chắn muốn hủy đơn MSH-" + id + "?\n\n";
            msg += 'Sau khi hủy, trạng thái đơn sẽ chuyển sang "Đã hủy".';
            msg +=
              "\nNếu cần hỗ trợ, vui lòng liên hệ bộ phận chăm sóc khách hàng.";
            var el = document.getElementById("cancelMessage");
            if (el) el.textContent = msg;
            var modalEl = document.getElementById("cancelModal");
            if (modalEl) {
              modalEl.classList.add("active");
              modalEl.setAttribute("aria-hidden", "false");
            }
          });
        });
      }

      function cancelOrder(id) {
        var orders = getOrders();
        var idx = orders.findIndex(function (o) {
          return (o.id || "").toString() === (id || "").toString();
        });
        if (idx === -1) return showToast("Không tìm thấy đơn hàng", "error");
        // store previous status and cancelled timestamp
        orders[idx].previousStatus = orders[idx].status || "";
        orders[idx].status = "Đã hủy";
        orders[idx].cancelledAt = new Date().toISOString();
        localStorage.setItem("mini_orders", JSON.stringify(orders));
        showToast(
          "Đơn MSH-" + id + " đã được hủy. Liên hệ hỗ trợ nếu cần.",
          "info",
        );
        renderOrders();
      }

      refreshCartCount();
      renderOrders();
      // modal interaction handlers (registered once)
      var pendingCancelId = null;
      (function () {
        var modalEl = document.getElementById("cancelModal");
        var btnConfirm = document.getElementById("cancelConfirm");
        var btnDismiss = document.getElementById("cancelDismiss");
        if (!modalEl) return;

        // dismiss by clicking overlay
        modalEl.addEventListener("click", function (ev) {
          if (ev.target === modalEl) {
            pendingCancelId = null;
            modalEl.classList.remove("active");
            modalEl.setAttribute("aria-hidden", "true");
          }
        });

        // dismiss button
        if (btnDismiss) {
          btnDismiss.addEventListener("click", function () {
            pendingCancelId = null;
            modalEl.classList.remove("active");
            modalEl.setAttribute("aria-hidden", "true");
          });
        }

        // confirm button
        if (btnConfirm) {
          btnConfirm.addEventListener("click", function () {
            if (!pendingCancelId) return;
            cancelOrder(pendingCancelId);
            pendingCancelId = null;
            modalEl.classList.remove("active");
            modalEl.setAttribute("aria-hidden", "true");
          });
        }

        // keyboard: Esc to close
        document.addEventListener("keydown", function (ev) {
          if (ev.key === "Escape" && modalEl.classList.contains("active")) {
            pendingCancelId = null;
            modalEl.classList.remove("active");
            modalEl.setAttribute("aria-hidden", "true");
          }
        });
      })();
    </script>
  </body>
</html>
