<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chi tiết sản phẩm - MiniShop</title>
    <link rel="stylesheet" href="../css/minishop.css" />
    <style>
      .product-detail {
        display: flex;
        gap: 24px;
        padding: 24px 0;
      }
      .pd-media {
        flex: 1;
      }
      .pd-info {
        flex: 1;
      }
      .pd-price {
        color: var(--accent);
        font-size: 1.25rem;
        margin: 8px 0;
      }
      @media (max-width: 900px) {
        .product-detail {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html">Đăng nhập</a>
          <a href="dangky.html">Đăng ký</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
      </div>
    </header>
    <script src="../js/common.js"></script>

    <main class="container">
      <div id="detailRoot"></div>
    </main>

    <script>
      var products = [
        {
          id: 1,
          title: "Áo thun basic",
          price: 199000,
          img: "../images/products/aothunden.jpg",
          desc: "Áo thun mềm mại, thoáng mát phù hợp hàng ngày.",
        },
        {
          id: 2,
          title: "Quần jean",
          price: 299000,
          img: "../images/products/quanjean.jpg",
          desc: "Quần jean form ôm vừa vặn, chất liệu bền.",
        },
        {
          id: 3,
          title: "Váy nữ",
          price: 349000,
          img: "../images/products/bonuday.jpeg",
          desc: "Váy nữ trẻ trung, phong cách.",
        },
        {
          id: 4,
          title: "Áo sơ mi",
          price: 249000,
          img: "../images/products/somi.jpg",
          desc: "Áo sơ mi lịch sự, phù hợp công sở.",
        },
        {
          id: 5,
          title: "Mũ thời trang",
          price: 89000,
          img: "../images/products/images.jpg",
          desc: "Mũ phong cách, nhiều màu sắc.",
        },
        {
          id: 6,
          title: "Áo khoác",
          price: 499000,
          img: "../images/products/quanaobongchuyen.jpg",
          desc: "Áo khoác ấm áp, chống gió.",
        },
        {
          id: 7,
          title: "Giày thể thao",
          price: 599000,
          img: "../images/products/images.jpg",
          desc: "Giày êm chân, phù hợp chạy bộ.",
        },
        {
          id: 8,
          title: "Túi xách",
          price: 259000,
          img: "../images/products/bonuday.jpeg",
          desc: "Túi xách thời trang, nhiều ngăn.",
        },
        {
          id: 9,
          title: "Đồng hồ",
          price: 1290000,
          img: "../images/products/quanjean.jpg",
          desc: "Đồng hồ sang trọng, chống nước.",
        },
      ];

      function formatVND(n) {
        return "₫" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function getQuery(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      var id = parseInt(getQuery("id")) || 1;
      var p =
        products.find(function (x) {
          return x.id === id;
        }) || products[0];

      var root = document.getElementById("detailRoot");
      root.innerHTML =
        '<div class="product-detail">' +
        '<button class="heart-btn" data-product="' +
        p.title +
        '" title="Yêu thích" style="position:absolute;top:10px;right:10px">♡</button>' +
        '<div class="pd-media"><img src="' +
        p.img +
        '" alt="' +
        p.title +
        '" loading="eager" decoding="async" width="600" height="600" style="width:100%;border-radius:8px"></div>' +
        '<div class="pd-info">' +
        "<h1>" +
        p.title +
        "</h1>" +
        '<div class="pd-price">' +
        formatVND(p.price) +
        "</div>" +
        "<p>" +
        p.desc +
        "</p>" +
        '<div style="margin:12px 0">' +
        '<label>Size:</label> <select id="sizeSelect" style="padding:8px;border-radius:6px;margin-left:8px"><option value="M">M</option><option value="L">L</option><option value="XL">XL</option></select>' +
        "</div>" +
        '<div style="margin:12px 0">' +
        '<label>Màu:</label> <select id="colorSelect" style="padding:8px;border-radius:6px;margin-left:8px"><option value="Đen">Đen</option><option value="Trắng">Trắng</option><option value="Xanh">Xanh</option></select>' +
        "</div>" +
        '<div style="margin:12px 0">Số lượng: <input id="qty" type="number" value="1" min="1" style="width:60px;padding:6px;margin-left:8px;border-radius:6px;border:1px solid #e6e6e6"></div>' +
        '<div style="display:flex;gap:8px">' +
        '<button id="addCart" class="btn primary">Thêm vào giỏ</button>' +
        '<a class="btn" href="giohang.html">Xem giỏ hàng</a>' +
        "</div>" +
        "</div>" +
        "</div>" +
        '<section class="product-desc" style="margin-top:18px;background:#fff;padding:18px;border-radius:10px;box-shadow:var(--shadow-sm)">' +
        '<h2 style="margin-top:0">Mô tả sản phẩm</h2>' +
        '<div id="pdFullDesc" style="color:var(--muted);">' +
        p.desc +
        "</div>" +
        "</section>" +
        '<section class="product-reviews" style="margin-top:18px;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between"><h2>Đánh giá</h2><div id="avgRating" style="color:var(--muted)"></div></div>' +
        '<div id="reviewsList" style="margin-top:12px;display:grid;gap:12px"></div>' +
        '<form id="reviewForm" style="margin-top:14px;background:#fff;padding:12px;border-radius:10px;box-shadow:var(--shadow-sm)">' +
        '<h3 style="margin:0 0 8px">Viết đánh giá</h3>' +
        '<div style="display:flex;gap:8px;margin-bottom:8px"><select id="reviewRating" required style="padding:8px;border-radius:6px"><option value="5">5 - Xuất sắc</option><option value="4">4 - Tốt</option><option value="3">3 - Trung bình</option><option value="2">2 - Kém</option><option value="1">1 - Rất kém</option></select><input id="reviewName" placeholder="Tên của bạn" required style="flex:1;padding:8px;border-radius:6px;border:1px solid #e6e6e6"/></div>' +
        '<div><textarea id="reviewText" placeholder="Viết nhận xét..." rows="4" required style="width:100%;padding:8px;border-radius:6px;border:1px solid #e6e6e6"></textarea></div>' +
        '<div style="margin-top:8px"><button class="btn primary" type="submit">Gửi đánh giá</button></div>' +
        "</form>" +
        "</section>";

      document.getElementById("addCart").addEventListener("click", function () {
        var qty = parseInt(document.getElementById("qty").value) || 1;
        var size = document.getElementById("sizeSelect").value;
        var color = document.getElementById("colorSelect").value;
        window.addToCart({
          id: p.id,
          title: p.title,
          price: p.price,
          qty: qty,
          size: size,
          color: color,
        });
      });

      // Heart button favorite toggle
      (function setupHeartButton() {
        var btn = document.querySelector(".heart-btn");
        if (!btn) return;
        var productName = btn.getAttribute("data-product");
        var favorites = JSON.parse(
          localStorage.getItem("mini_favorites") || "[]",
        );
        if (favorites.includes(productName)) {
          btn.classList.add("liked");
        }
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          var favorites = JSON.parse(
            localStorage.getItem("mini_favorites") || "[]",
          );
          var index = favorites.indexOf(productName);
          if (index > -1) {
            favorites.splice(index, 1);
            btn.classList.remove("liked");
            showToast('Đã bỏ yêu thích "' + productName + '"', "info");
          } else {
            favorites.push(productName);
            btn.classList.add("liked");
            showToast('Đã thêm "' + productName + '" vào yêu thích', "success");
          }
          localStorage.setItem("mini_favorites", JSON.stringify(favorites));
        });
      })();
      // Reviews storage and rendering
      function getReviews(productId) {
        try {
          return JSON.parse(
            localStorage.getItem("mini_reviews_" + productId) || "[]",
          );
        } catch (e) {
          return [];
        }
      }
      function saveReviews(productId, arr) {
        localStorage.setItem(
          "mini_reviews_" + productId,
          JSON.stringify(arr || []),
        );
      }
      function renderReviews() {
        var list = document.getElementById("reviewsList");
        var avgEl = document.getElementById("avgRating");
        if (!list) return;
        var revs = getReviews(p.id);
        list.innerHTML = "";
        if (!revs.length) {
          list.innerHTML =
            '<div style="padding:12px;background:#fff;border-radius:8px;color:var(--muted)">Chưa có đánh giá nào.</div>';
          avgEl.textContent = "";
          return;
        }
        var avg =
          revs.reduce(function (s, r) {
            return s + (r.rating || 0);
          }, 0) / revs.length;
        avgEl.textContent =
          "Điểm trung bình: " +
          Math.round(avg * 10) / 10 +
          " / 5 (" +
          revs.length +
          " đánh giá)";
        revs.forEach(function (r) {
          var div = document.createElement("div");
          div.style = "background:#fff;padding:12px;border-radius:8px;";
          var stars = new Array(5)
            .fill(0)
            .map(function (_, i) {
              return i < r.rating ? "★" : "☆";
            })
            .join("");
          div.innerHTML =
            '<div style="font-weight:700">' +
            (r.name || "Khách hàng") +
            ' <span style="color:var(--muted);font-weight:600">' +
            stars +
            '</span></div><div style="color:var(--muted);margin-top:6px">' +
            (r.text || "") +
            '</div><div style="color:var(--muted);font-size:0.85rem;margin-top:8px">' +
            new Date(r.t || Date.now()).toLocaleString() +
            "</div>";
          list.appendChild(div);
        });
      }

      (function attachReviewForm() {
        var form = document.getElementById("reviewForm");
        if (!form) return;
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var rating =
            parseInt(document.getElementById("reviewRating").value, 10) || 5;
          var name =
            document.getElementById("reviewName").value.trim() || "Khách hàng";
          var text = document.getElementById("reviewText").value.trim() || "";
          var revs = getReviews(p.id);
          revs.unshift({
            rating: rating,
            name: name,
            text: text,
            t: Date.now(),
          });
          saveReviews(p.id, revs);
          renderReviews();
          form.reset();
          showToast("Cảm ơn bạn đã đánh giá", "success");
        });
      })();

      // initial reviews render
      renderReviews();
    </script>
  </body>
</html>
