<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Địa chỉ - MiniShop</title>
    <link rel="stylesheet" href="../css/minishop.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html">Đăng nhập</a>
          <a href="dangky.html">Đăng ký</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html">Giỏ (0)</a>
      </div>
    </header>

    <main class="container">
      <div class="account-wrap">
        <aside class="account-aside">
          <div class="aside-card">
            <nav>
              <a href="taikhoan.html" data-panel="profile">Hồ sơ</a>
              <a href="hoadon.html" data-panel="orders">Đơn hàng</a>
              <a href="diachi.html" class="active" data-panel="addresses"
                >Địa chỉ</a
              >
              <a href="phuongthucthanhtoan.html" data-panel="payments"
                >Phương thức thanh toán</a
              >
              <a href="yeuthich.html" data-panel="favorites">Yêu thích</a>
              <a href="caidat.html" data-panel="settings">Cài đặt</a>
              <a id="manageLink" href="../admin/html_qly/quanly.html" style="display: none"
                >Quản lý</a
              >
              <a id="logoutLink" href="dangnhap.html">Đăng xuất</a>
            </nav>
          </div>
        </aside>

        <section class="account-main">
          <div class="account-panel address-panel">
            <h2>Địa chỉ</h2>

            <div class="aside-card" style="margin-bottom: 12px; padding: 12px">
              <div
                style="
                  margin-bottom: 12px;
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                "
              >
                <div style="font-size: 0.95rem; color: var(--muted)">
                  Quản lý địa chỉ nhận hàng của bạn
                </div>
                <button id="openAddAddress" class="btn primary">
                  Thêm địa chỉ mới
                </button>
              </div>

              <!-- Address modal -->
              <div
                id="addressModal"
                class="confirm-modal-overlay"
                aria-hidden="true"
              >
                <div
                  class="confirm-modal"
                  role="dialog"
                  aria-modal="true"
                  aria-labelledby="addrTitle"
                >
                  <h3 id="addrTitle">Thêm / Sửa địa chỉ</h3>
                  <form id="addAddressForm">
                    <div style="display: flex; gap: 8px; flex-wrap: wrap">
                      <input
                        id="addrName"
                        class="input"
                        placeholder="Tên người nhận"
                        required
                        style="flex: 1 1 200px"
                      />
                      <input
                        id="addrPhone"
                        class="input"
                        placeholder="Số điện thoại"
                        required
                        style="flex: 1 1 160px"
                      />
                    </div>
                    <div style="margin-top: 8px">
                      <input
                        id="addrText"
                        class="input"
                        placeholder="Địa chỉ (tỉnh, quận, phường, ... )"
                        required
                        style="width: 100%"
                      />
                    </div>
                    <div
                      style="
                        margin-top: 8px;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                      "
                    >
                      <input id="addrDefault" type="checkbox" />
                      <label for="addrDefault">Đặt làm địa chỉ mặc định</label>
                    </div>
                    <div
                      style="
                        margin-top: 10px;
                        display: flex;
                        gap: 8px;
                        justify-content: flex-end;
                      "
                    >
                      <button type="button" id="addrCancel" class="btn">
                        Hủy
                      </button>
                      <button type="submit" class="btn primary">
                        Lưu địa chỉ
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>

            <div id="addressesList" style="display: grid; gap: 10px"></div>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>© 2026 MiniShop. All rights reserved.</div>
        <div class="footer-links">
          <a href="lienhe.html">Hỗ trợ</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="thanhtoan.html">Thanh toán</a>
        </div>
      </div>
    </footer>

    <script src="../js/common.js"></script>
    <script>
      function refreshCartCount() {
        if (window.updateCartCount) return window.updateCartCount();
      }
      refreshCartCount();

      // Addresses: localStorage key 'mini_addresses'
      function getAddresses() {
        return JSON.parse(localStorage.getItem("mini_addresses") || "[]");
      }

      function saveAddresses(arr) {
        localStorage.setItem("mini_addresses", JSON.stringify(arr || []));
      }

      function renderAddresses() {
        var container = document.getElementById("addressesList");
        var addresses = getAddresses();
        if (!addresses.length) {
          container.innerHTML =
            '<div style="padding:12px;border:1px dashed #e6f0ff;border-radius:10px;color:var(--muted)">Bạn chưa lưu địa chỉ nào.</div>';
          return;
        }

        container.innerHTML = addresses
          .map(function (a) {
            return (
              '<div style="border:1px solid #eef6ff;border-radius:10px;padding:12px;background:#fff;display:flex;justify-content:space-between;align-items:flex-start">' +
              "<div>" +
              '<div style="font-weight:600">' +
              (a.name || "—") +
              (a.isDefault
                ? ' <span style="color:var(--accent);font-weight:600">(Mặc định)</span>'
                : "") +
              "</div>" +
              '<div style="color:var(--muted);margin-top:6px">' +
              (a.phone || "") +
              "</div>" +
              '<div style="margin-top:8px">' +
              (a.text || "") +
              "</div>" +
              "</div>" +
              '<div style="display:flex;flex-direction:column;gap:6px">' +
              '<button class="btn" data-id="' +
              a.id +
              '" data-action="edit">Sửa</button>' +
              '<button class="btn" data-id="' +
              a.id +
              '" data-action="setDefault">Đặt mặc định</button>' +
              '<button class="btn danger" data-id="' +
              a.id +
              '" data-action="remove">Xóa</button>' +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        // attach handlers
        container
          .querySelectorAll("button[data-action]")
          .forEach(function (btn) {
            btn.addEventListener("click", function () {
              var id = this.getAttribute("data-id");
              var action = this.getAttribute("data-action");
              if (!id) return;
              if (action === "remove") {
                if (!confirm("Bạn có chắc muốn xóa địa chỉ này?")) return;
                var arr = getAddresses().filter(function (x) {
                  return x.id !== id;
                });
                saveAddresses(arr);
                showToast("Đã xóa địa chỉ", "info");
                renderAddresses();
                if (window.updateHeaderDefaultAddress)
                  window.updateHeaderDefaultAddress();
              } else if (action === "setDefault") {
                var arr = getAddresses().map(function (x) {
                  x.isDefault = x.id === id;
                  return x;
                });
                saveAddresses(arr);
                showToast("Đã đặt địa chỉ làm mặc định", "info");
                renderAddresses();
                if (window.updateHeaderDefaultAddress)
                  window.updateHeaderDefaultAddress();
              } else if (action === "edit") {
                var addr = getAddresses().find(function (x) {
                  return x.id === id;
                });
                if (!addr) return;
                pendingEditId = id;
                var nameEl = document.getElementById("addrName");
                var phoneEl = document.getElementById("addrPhone");
                var textEl = document.getElementById("addrText");
                var defaultEl = document.getElementById("addrDefault");
                if (nameEl) nameEl.value = addr.name || "";
                if (phoneEl) phoneEl.value = addr.phone || "";
                if (textEl) textEl.value = addr.text || "";
                if (defaultEl) defaultEl.checked = !!addr.isDefault;
                var modal = document.getElementById("addressModal");
                if (modal) {
                  var titleEl = document.getElementById("addrTitle");
                  if (titleEl) titleEl.textContent = "Sửa địa chỉ";
                  modal.classList.add("active");
                  modal.setAttribute("aria-hidden", "false");
                  var nameElF = document.getElementById("addrName");
                  if (nameElF) nameElF.focus();
                }
              }
            });
          });
      }

      // Add/Edit address handling using modal form
      var pendingEditId = null;
      (function () {
        var form = document.getElementById("addAddressForm");
        var openBtn = document.getElementById("openAddAddress");
        var modal = document.getElementById("addressModal");
        var cancelBtn = document.getElementById("addrCancel");
        if (openBtn) {
          openBtn.addEventListener("click", function () {
            pendingEditId = null;
            form.reset();
            if (modal) {
              var titleEl = document.getElementById("addrTitle");
              if (titleEl) titleEl.textContent = "Thêm địa chỉ";
              modal.classList.add("active");
              modal.setAttribute("aria-hidden", "false");
              var nameElF = document.getElementById("addrName");
              if (nameElF) nameElF.focus();
            }
          });
        }
        if (cancelBtn) {
          cancelBtn.addEventListener("click", function () {
            pendingEditId = null;
            if (modal) {
              modal.classList.remove("active");
              modal.setAttribute("aria-hidden", "true");
            }
          });
        }
        if (modal) {
          modal.addEventListener("click", function (ev) {
            if (ev.target === modal) {
              pendingEditId = null;
              modal.classList.remove("active");
              modal.setAttribute("aria-hidden", "true");
            }
          });
        }

        if (!form) return;
        form.addEventListener("submit", function (ev) {
          ev.preventDefault();
          var name = document.getElementById("addrName").value.trim();
          var phone = document.getElementById("addrPhone").value.trim();
          var text = document.getElementById("addrText").value.trim();
          var isDefault = document.getElementById("addrDefault").checked;
          if (!name || !phone || !text) {
            showToast("Vui lòng nhập đầy đủ thông tin địa chỉ", "error");
            return;
          }
          var arr = getAddresses();
          if (isDefault) {
            arr = arr.map(function (x) {
              x.isDefault = false;
              return x;
            });
          }
          if (pendingEditId) {
            arr = arr.map(function (x) {
              if (x.id === pendingEditId) {
                x.name = name;
                x.phone = phone;
                x.text = text;
                x.isDefault = !!isDefault;
              }
              return x;
            });
            showToast("Đã cập nhật địa chỉ", "success");
          } else {
            var id =
              Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            arr.push({
              id: id,
              name: name,
              phone: phone,
              text: text,
              isDefault: !!isDefault,
              createdAt: new Date().toISOString(),
            });
            showToast("Đã thêm địa chỉ mới", "success");
          }
          saveAddresses(arr);
          if (modal) {
            modal.classList.remove("active");
            modal.setAttribute("aria-hidden", "true");
          }
          form.reset();
          renderAddresses();
          if (window.updateHeaderDefaultAddress)
            window.updateHeaderDefaultAddress();
        });
      })();

      // initial render
      renderAddresses();
    </script>
  </body>
</html>
