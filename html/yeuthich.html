  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html">Đăng nhập</a>

        <a class="cart-btn" href="giohang.html" aria-label="Giỏ hàng (0)">

              /></svg
          ></span>
          <span class="cart-count">0</span>

    <main class="container">
      <div class="account-wrap">
        <aside class="account-aside">
          <div class="aside-card">
            <nav>
              <a href="taikhoan.html" data-panel="profile">Hồ sơ</a>
              <a href="hoadon.html" data-panel="orders">Đơn hàng</a>
              <a href="diachi.html" data-panel="addresses">Địa chỉ</a>
              <a href="phuongthucthanhtoan.html" data-panel="payments"
                >Phương thức thanh toán</a
              >
              <a href="yeuthich.html" class="active" data-panel="favorites"
                >Yêu thích</a
              >
              <a href="caidat.html" data-panel="settings">Cài đặt</a>
              <a id="manageLink" href="../admin/html_qly/quanly.html" style="display: none"
                >Quản lý</a
              >
              <a id="logoutLink" href="dangnhap.html">Đăng xuất</a>
            </nav>
          </div>
        </aside>

        <section class="account-main">
          <div class="account-panel">
            <h2>Yêu thích</h2>
            <div id="favoritesList" class="favorites-grid"></div>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>© 2026 MiniShop. All rights reserved.</div>
        <div class="footer-links">
          <a href="lienhe.html">Hỗ trợ</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="thanhtoan.html">Thanh toán</a>
        </div>
      </div>
    </footer>

    <script src="../js/common.js"></script>
    <script>
      var allProducts = [
        {
          id: 1,
          title: "Áo thun basic",
          price: 199000,
          img: "../images/products/aothunden.jpg",
        },
        {
          id: 2,
          title: "Quần jean",
          price: 299000,
          img: "../images/products/quanjean.jpg",
        },
        {
          id: 3,
          title: "Váy nữ",
          price: 349000,
          img: "../images/products/bonuday.jpeg",
        },
        {
          id: 4,
          title: "Áo sơ mi",
          price: 249000,
          img: "../images/products/somi.jpg",
        },
        {
          id: 5,
          title: "Mũ thời trang",
          price: 89000,
          img: "../images/products/images.jpg",
        },
        {
          id: 6,
          title: "Áo khoác",
          price: 499000,
          img: "../images/products/quanaobongchuyen.jpg",
        },
        {
          id: 7,
          title: "Giày thể thao",
          price: 599000,
          img: "../images/products/images.jpg",
        },
        {
          id: 8,
          title: "Túi xách",
          price: 259000,
          img: "../images/products/bonuday.jpeg",
        },
        {
          id: 9,
          title: "Đồng hồ",
          price: 1290000,
          img: "../images/products/quanjean.jpg",
        },
        {
          id: 10,
          title: "Áo hoodie",
          price: 399000,
          img: "../images/products/somi.jpg",
        },
        {
          id: 11,
          title: "Sandal nữ",
          price: 189000,
          img: "../images/products/images.jpg",
        },
        {
          id: 12,
          title: "Ví da nam",
          price: 229000,
          img: "../images/products/quanaobongchuyen.jpg",
        },
      ];

      function formatVND(n) {
        return "₫" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function renderFavorites() {
        var favorites = JSON.parse(
          localStorage.getItem("mini_favorites") || "[]",
        );
        var container = document.getElementById("favoritesList");

        if (!favorites.length) {
          container.innerHTML =
            '<p style="text-align:center;padding:20px;color:#666">Chưa có sản phẩm yêu thích.</p>';
          return;
        }

        container.innerHTML = "";
        favorites.forEach(function (name) {
          var p = allProducts.find(function (x) {
            return x.title === name;
          });
          if (!p) return;

          var article = document.createElement("article");
          article.className = "product";
          article.innerHTML =
            '<img src="' +
            p.img +
            '" alt="' +
            p.title +
            '" loading="lazy" decoding="async" width="300" height="300" style="height:200px;object-fit:cover"/>' +
            "<h3>" +
            p.title +
            "</h3>" +
            '<p class="price">' +
            formatVND(p.price) +
            "</p>" +
            '<div class="actions">' +
            '<button class="btn add-to-cart" data-title="' +
            p.title +
            '">Thêm vào giỏ</button>' +
            '<button class="btn btn-remove" data-title="' +
            p.title +
            '">Bỏ yêu thích</button>' +
            "</div>";

          container.appendChild(article);
        });

        // Attach event listeners
        container.querySelectorAll(".add-to-cart").forEach(function (btn) {
          if (btn.dataset.addCartAttached) return;
          btn.dataset.addCartAttached = "1";
          btn.addEventListener("click", function () {
            var title = this.getAttribute("data-title");
            var p = allProducts.find(function (x) {
              return x.title === title;
            });
            if (!p) return;
            window.addToCart({
              id: p.id,
              title: p.title,
              price: p.price,
              qty: 1,
            });
          });
        });

        container.querySelectorAll(".btn-remove").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var title = this.getAttribute("data-title");
            var favorites = JSON.parse(
              localStorage.getItem("mini_favorites") || "[]",
            );
            favorites = favorites.filter(function (x) {
              return x !== title;
            });
            localStorage.setItem("mini_favorites", JSON.stringify(favorites));
            renderFavorites();
          });
        });
      }

      function refreshCartCount() {
        if (window.updateCartCount) return window.updateCartCount();
      }

      refreshCartCount();
      renderFavorites();
    </script>
  </body>
</html>
