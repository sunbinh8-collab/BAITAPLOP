<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đơn hàng của tôi - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
    
    <style>
      /* --- HỆ THỐNG DESIGN SYSTEM ĐỒNG BỘ --- */
      :root {
        --primary-color: #ff4757;
        --primary-hover: #ee3848;
        --text-color: #2f3542;
        --text-muted: #747d8c;
        --border-color: #e4e7eb;
        --bg-light: #f8f9fa;
        --radius-md: 10px;
        --radius-lg: 14px;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 15px rgba(0, 0, 0, 0.08);
        --transition: all 0.25s ease;

        /* Màu trạng thái đơn hàng */
        --color-pending: #f6c23e;
        --color-shipping: #36b9cc;
        --color-completed: #2ed573;
        --color-cancelled: #e74a3b;
      }

      body {
        background-color: #f7f9fa;
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 15px;
      }

      /* === SITE HEADER === */
      .site-header {
        background: #fff;
        box-shadow: var(--shadow-sm);
        padding: 15px 0;
      }
      .header-inner { display: flex; justify-content: space-between; align-items: center; }
      .logo { font-size: 24px; font-weight: 700; color: var(--primary-color); text-decoration: none; }
      .main-nav a {
        color: var(--text-color); text-decoration: none; margin-right: 20px; font-weight: 500; transition: var(--transition);
      }
      .main-nav a:hover, .main-nav a.active { color: var(--primary-color); }
      .cart-btn {
        background: var(--primary-color); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-weight: 600;
      }

      /* Layout hai cột Tài khoản */
      .account-wrap {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 30px;
        margin: 40px auto;
      }

      @media (max-width: 768px) {
        .account-wrap { grid-template-columns: 1fr; gap: 20px; }
      }

      /* Thanh menu tài khoản bên trái */
      .account-aside .aside-card {
        background: #fff;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        padding: 10px;
        border: 1px solid var(--border-color);
      }
      .account-aside nav { display: flex; flex-direction: column; gap: 4px; }
      .account-aside nav a {
        display: block; padding: 12px 16px; color: var(--text-color); text-decoration: none; font-weight: 500; border-radius: 6px; transition: var(--transition); font-size: 0.95rem;
      }
      .account-aside nav a:hover, .account-aside nav a.active {
        background-color: #ffe0e3; color: var(--primary-color);
      }

      /* Panel hiển thị đơn hàng bên phải */
      .account-panel {
        background: #fff;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        padding: 24px;
        border: 1px solid var(--border-color);
      }
      .account-panel h2 {
        font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid var(--border-color);
      }

      /* Khối Card Đơn Hàng Cao Cấp */
      .order-card {
        background: #fff; border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); transition: var(--transition);
      }
      .order-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
      .order-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
      .order-id { font-size: 1.05rem; font-weight: 700; color: var(--text-color); }
      .order-date { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

      /* Badge Trạng Thái Đồng Bộ Hệ Thống */
      .badge-status { display: inline-block; padding: 5px 14px; font-size: 0.8rem; font-weight: 700; border-radius: 30px; text-align: center; }
      .status-pending { background-color: rgba(246, 194, 62, 0.1); color: var(--color-pending); }
      .status-shipping { background-color: rgba(54, 185, 204, 0.1); color: var(--color-shipping); }
      .status-completed { background-color: rgba(46, 213, 115, 0.1); color: var(--color-completed); }
      .status-cancelled { background-color: rgba(231, 74, 59, 0.1); color: var(--color-cancelled); }

      .order-body { padding: 15px 0; border-bottom: 1px solid var(--border-color); }
      .order-items-summary { font-weight: 600; color: var(--text-color); font-size: 0.95rem; margin-bottom: 12px; }
      .recipient-info { background-color: var(--bg-light); padding: 12px 16px; border-radius: var(--radius-md); font-size: 0.88rem; color: var(--text-color); line-height: 1.6; }
      .recipient-info div strong { color: #57606f; display: inline-block; width: 110px; }

      .order-footer { padding-top: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 0.92rem; }
      .payment-method { color: var(--text-muted); font-weight: 500; }
      .order-total-price { font-size: 1.2rem; font-weight: 700; color: var(--primary-color); }
      .empty-orders { padding: 40px; border: 2px dashed #ced6e0; border-radius: var(--radius-lg); text-align: center; color: var(--text-muted); font-weight: 500; background-color: #fff; }
    </style>
  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html" id="navLoginLink">Đăng nhập</a>
          <a href="dangky.html" id="navRegisterLink">Đăng ký</a>
          <a class="active" href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html" id="headerCartBtn">Giỏ hàng (0)</a>
      </div>
    </header>

    <main class="container">
      <div class="account-wrap">
        <aside class="account-aside">
          <div class="aside-card">
            <nav>
              <a href="taikhoan.html" data-panel="profile">Hồ sơ cá nhân</a>
              <a href="hoadon.html" class="active" data-panel="orders">Đơn hàng của tôi</a>
              <a href="diachi.html" data-panel="addresses">Địa chỉ</a>
              <a href="phuongthucthanhtoan.html" data-panel="payments">Phương thức thanh toán</a>
              <a href="yeuthich.html" data-panel="favorites">Danh sách yêu thích</a>
              <a href="#" id="asideLogout" style="color: var(--primary-color);">Đăng xuất</a>
            </nav>
          </div>
        </aside>

        <section class="account-main">
          <div class="account-panel">
            <h2>Quản lý đơn hàng</h2>
            <div id="ordersList" style="display: grid; gap: 16px;"></div>
          </div>
        </section>
      </div>
    </main>

    <div class="footer-bottom" style="border-top: 1px solid var(--border-color); margin-top: 30px; padding-top: 20px; text-align: center; color: var(--text-muted);">
          <div style="margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px;">
            © 2026 <span style="color: var(--primary-color); font-weight: 600;">MiniShop</span>. All rights reserved. Powered by HTML5 & CSS3.
          </div>
          <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <img src="images/payment-methods.png" alt="Phương thức thanh toán" style="max-height: 24px; opacity: 0.6; filter: grayscale(100%);" onerror="this.style.display='none'">
          </div>
        </div>

    <script>
      function formatVND(n) {
        return "₫" + parseInt(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function updateCartCount() {
        var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
        var count = cart.reduce(function (sum, item) { return sum + (item.qty || 0); }, 0);
        var btn = document.getElementById("headerCartBtn");
        if (btn) btn.textContent = "Giỏ (" + count + ")";
      }

      // --- BẢO VỆ TUYẾN ĐƯỜNG (KIỂM TRA ĐĂNG NHẬP) ---
      var currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");
      if (!currentUser) {
        window.location.href = "dangnhap.html";
      }

      // --- ĐỒNG BỘ TRẠNG THÁI ĐĂNG NHẬP TRÊN HEADER ---
      if (currentUser) {
        var navLogin = document.getElementById("navLoginLink");
        var navRegister = document.getElementById("navRegisterLink");
        if (navLogin) { navLogin.textContent = currentUser.name; navLogin.href = "taikhoan.html"; }
        if (navRegister) {
          navRegister.textContent = "Đăng xuất"; navRegister.href = "#";
          navRegister.addEventListener("click", handleLogout);
        }
      }

      function handleLogout(e) {
        if(e) e.preventDefault();
        localStorage.removeItem("currentUser");
        localStorage.removeItem("mini_profile");
        window.location.href = "dangnhap.html";
      }
      document.getElementById("asideLogout").addEventListener("click", handleLogout);

      function getOrders() {
        var mockOrders = [
          {
            id: "2026071301",
            createdAt: "13/07/2026 21:15",
            status: "Đang xử lý",
            items: [{ title: "Áo thun Basic Unisex Nam Nữ" }, { title: "Quần Jean Slimfit Nam" }],
            paymentMethod: "cod",
            total: 498000,
            recipient: { name: currentUser ? currentUser.name : "Nguyễn Hoàng Sơn", phone: "0912345678", address: "Số 123 Đường Lê Lợi, Quận 1, TP. Hồ Chí Minh" }
          },
          {
            id: "2026060502",
            createdAt: "05/06/2026 09:40",
            status: "Đã giao thành công",
            items: [{ title: "Áo sơ mi lụa nữ cổ bẻ" }],
            paymentMethod: "momo",
            total: 249000,
            recipient: { name: currentUser ? currentUser.name : "Nguyễn Hoàng Sơn", phone: "0912345678", address: "Số 123 Đường Lê Lợi, Quận 1, TP. Hồ Chí Minh" }
          }
        ];

        var storedOrders = localStorage.getItem("mini_orders");
        if (!storedOrders) {
          localStorage.setItem("mini_orders", JSON.stringify(mockOrders));
          return mockOrders;
        }
        return JSON.parse(storedOrders);
      }

      function renderOrders() {
        var container = document.getElementById("ordersList");
        var orders = getOrders();

        if (!orders.length) {
          container.innerHTML = '<div class="empty-orders">Bạn chưa có đơn hàng nào tại MiniShop.</div>';
          return;
        }

        container.innerHTML = orders
          .map(function (order) {
            var itemsText = order.items
              .slice(0, 2)
              .map(function (item) { return item.title; })
              .join(", ");
            
            var extra = order.items.length > 2 ? " và hơn " + (order.items.length - 2) + " sản phẩm" : "";
            
            var paymentLabel = "Thanh toán khi nhận hàng (COD)";
            if (order.paymentMethod === "bank") paymentLabel = "Chuyển khoản ngân hàng";
            if (order.paymentMethod === "momo") paymentLabel = "Ví điện tử MoMo";
            if (order.paymentMethod === "card") paymentLabel = "Thẻ tín dụng / Thẻ ghi nợ";

            // Đồng bộ bộ lọc bắt Class màu sắc dựa theo chuỗi trạng thái động
            var statusClass = "status-pending";
            if (order.status === "Đang giao") statusClass = "status-shipping";
            if (order.status === "Đã giao" || order.status === "Đã giao thành công" || order.status === "Đã thanh toán") statusClass = "status-completed";
            if (order.status === "Đã hủy") statusClass = "status-cancelled";

            return (
              '<div class="order-card">' +
                '<div class="order-header">' +
                  '<div>' +
                    '<div class="order-id">Mã đơn: MSH-' + order.id + '</div>' +
                    '<div class="order-date">Ngày đặt: ' + order.createdAt + '</div>' +
                  '</div>' +
                  '<span class="badge-status ' + statusClass + '">' + order.status + '</span>' +
                '</div>' +
                '<div class="order-body">' +
                  '<div class="order-items-summary">📦 Sản phẩm: <span style="font-weight: 500; color: #57606f;">' + itemsText + extra + '</span></div>' +
                  '<div class="recipient-info">' +
                    '<div><strong>Người nhận:</strong> ' + (order.recipient && order.recipient.name ? order.recipient.name : "Chưa cập nhật") + '</div>' +
                    '<div><strong>Số điện thoại:</strong> ' + (order.recipient && order.recipient.phone ? order.recipient.phone : "Chưa cập nhật") + '</div>' +
                    '<div><strong>Địa chỉ giao:</strong> ' + (order.recipient && order.recipient.address ? order.recipient.address : "Chưa cập nhật") + '</div>' +
                  '</div>' +
                '</div>' +
                '<div class="order-footer">' +
                  '<span class="payment-method">💳 ' + paymentLabel + '</span>' +
                  '<div class="order-total">Tổng tiền: <span class="order-total-price">' + formatVND(order.total) + '</span></div>' +
                '</div>' +
              '</div>'
            );
          })
          .join("");
      }

      updateCartCount();
      renderOrders();
    </script>
  </body>
</html>
