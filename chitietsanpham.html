<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chi tiết sản phẩm - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
    <style>
      .product-detail {
        display: flex;
        gap: 24px;
        padding: 24px 0;
      }
      .pd-media {
        flex: 1;
      }
      .pd-info {
        flex: 1;
      }
      .pd-price {
        color: var(--accent);
        font-size: 1.25rem;
        margin: 8px 0;
      }
      @media (max-width: 900px) {
        .product-detail {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
        </nav>
      </div>
    </header>
    <script src="js/common.js"></script>

    <main class="container">
      <div id="detailRoot"></div>
    </main>

    <script>
      var products = [
        {
          id: 1,
          title: "Áo thun basic",
          price: 199000,
          img: "https://via.placeholder.com/600x600?text=Áo+1",
          desc: "Áo thun mềm mại, thoáng mát phù hợp hàng ngày.",
        },
        {
          id: 2,
          title: "Quần jean",
          price: 299000,
          img: "https://via.placeholder.com/600x600?text=Quần+1",
          desc: "Quần jean form ôm vừa vặn, chất liệu bền.",
        },
        {
          id: 3,
          title: "Váy nữ",
          price: 349000,
          img: "https://via.placeholder.com/600x600?text=Váy+1",
          desc: "Váy nữ trẻ trung, phong cách.",
        },
        {
          id: 4,
          title: "Áo sơ mi",
          price: 249000,
          img: "https://via.placeholder.com/600x600?text=Áo+2",
          desc: "Áo sơ mi lịch sự, phù hợp công sở.",
        },
        {
          id: 5,
          title: "Mũ thời trang",
          price: 89000,
          img: "https://via.placeholder.com/600x600?text=Mũ",
          desc: "Mũ phong cách, nhiều màu sắc.",
        },
        {
          id: 6,
          title: "Áo khoác",
          price: 499000,
          img: "https://via.placeholder.com/600x600?text=Áo+3",
          desc: "Áo khoác ấm áp, chống gió.",
        },
        {
          id: 7,
          title: "Giày thể thao",
          price: 599000,
          img: "https://via.placeholder.com/600x600?text=Giày",
          desc: "Giày êm chân, phù hợp chạy bộ.",
        },
        {
          id: 8,
          title: "Túi xách",
          price: 259000,
          img: "https://via.placeholder.com/600x600?text=Túi",
          desc: "Túi xách thời trang, nhiều ngăn.",
        },
        {
          id: 9,
          title: "Đồng hồ",
          price: 1290000,
          img: "https://via.placeholder.com/600x600?text=Đồng+hồ",
          desc: "Đồng hồ sang trọng, chống nước.",
        },
      ];

      function formatVND(n) {
        return "₫" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function getQuery(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      var id = parseInt(getQuery("id")) || 1;
      var p =
        products.find(function (x) {
          return x.id === id;
        }) || products[0];

      var root = document.getElementById("detailRoot");
      root.innerHTML =
        '<div class="product-detail">' +
        '<button class="heart-btn" data-product="' +
        p.title +
        '" title="Yêu thích" style="position:absolute;top:10px;right:10px">♡</button>' +
        '<div class="pd-media"><img src="' +
        p.img +
        '" alt="' +
        p.title +
        '" style="width:100%;border-radius:8px"></div>' +
        '<div class="pd-info">' +
        "<h1>" +
        p.title +
        "</h1>" +
        '<div class="pd-price">' +
        formatVND(p.price) +
        "</div>" +
        "<p>" +
        p.desc +
        "</p>" +
        '<div style="margin:12px 0">' +
        '<label>Size:</label> <select id="sizeSelect" style="padding:8px;border-radius:6px;margin-left:8px"><option>M</option><option>L</option><option>XL</option></select>' +
        "</div>" +
        '<div style="margin:12px 0">Số lượng: <input id="qty" type="number" value="1" min="1" style="width:60px;padding:6px;margin-left:8px;border-radius:6px;border:1px solid #e6e6e6"></div>' +
        '<div style="display:flex;gap:8px">' +
        '<button id="addCart" class="btn primary">Thêm vào giỏ</button>' +
        '<a class="btn" href="giohang.html">Xem giỏ hàng</a>' +
        "</div>" +
        "</div>" +
        "</div>";

      document.getElementById("addCart").addEventListener("click", function () {
        var qty = parseInt(document.getElementById("qty").value) || 1;
        var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
        var exist = cart.find(function (i) {
          return i.id === p.id;
        });
        if (exist) exist.qty += qty;
        else cart.push({ id: p.id, title: p.title, price: p.price, qty: qty });
        localStorage.setItem("mini_cart", JSON.stringify(cart));
        // cập nhật số lượng trên header
        (function updateCartCount() {
          var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
          var count = cart.reduce(function (s, i) {
            return s + (i.qty || 0);
          }, 0);
          var btn = document.querySelector(".cart-btn");
          if (btn) btn.textContent = "Giỏ (" + count + ")";
        })();
        showToast("Đã thêm vào giỏ", "success");
        pulseCart();
      });

      // Heart button favorite toggle
      (function setupHeartButton() {
        var btn = document.querySelector(".heart-btn");
        if (!btn) return;
        var productName = btn.getAttribute("data-product");
        var favorites = JSON.parse(
          localStorage.getItem("mini_favorites") || "[]",
        );
        if (favorites.includes(productName)) {
          btn.classList.add("liked");
        }
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          var favorites = JSON.parse(
            localStorage.getItem("mini_favorites") || "[]",
          );
          var index = favorites.indexOf(productName);
          if (index > -1) {
            favorites.splice(index, 1);
            btn.classList.remove("liked");
            showToast('Đã bỏ yêu thích "' + productName + '"', "info");
          } else {
            favorites.push(productName);
            btn.classList.add("liked");
            showToast('Đã thêm "' + productName + '" vào yêu thích', "success");
          }
          localStorage.setItem("mini_favorites", JSON.stringify(favorites));
        });
      })();
    </script>
  </body>
</html>
