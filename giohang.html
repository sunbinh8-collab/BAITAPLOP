<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giỏ hàng - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a class="active" href="giohang.html">Giỏ hàng</a>
        </nav>
      </div>
    </header>

    <main class="container cart-page">
      <h1>Giỏ hàng của bạn</h1>

      <div class="cart-grid">
        <div>
          <table class="cart-table">
            <thead>
              <tr>
                <th>Sản phẩm</th>
                <th>Số lượng</th>
                <th>Giá</th>
                <th>Tạm tính</th>
              </tr>
            </thead>
            <tbody id="cartBody">
              <!-- rows rendered from localStorage -->
            </tbody>
          </table>

          <div class="cart-actions">
            <div>
              <button id="clearCart" class="btn">Xoá hết</button>
            </div>
            <div>
              <a class="btn" href="danhmucsanpham.html">Tiếp tục mua sắm</a>
            </div>
          </div>
        </div>

        <aside>
          <div class="cart-summary">
            <h3>Tóm tắt đơn hàng</h3>
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin: 8px 0;
              "
            >
              <span>Tạm tính</span><strong id="subTotal">0</strong>
            </div>
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin: 8px 0;
              "
            >
              <span>Phí vận chuyển</span><strong id="shipping">₫0</strong>
            </div>
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin: 8px 0;
                font-size: 1.1rem;
              "
            >
              <span>Thành tiền</span><strong id="grandTotal">0</strong>
            </div>
            <div style="margin-top: 12px">
              <input
                id="coupon"
                placeholder="Mã giảm giá"
                style="
                  width: 100%;
                  padding: 10px;
                  border-radius: 8px;
                  border: 1px solid #e6e6e6;
                "
              />
              <button
                id="applyCoupon"
                class="btn"
                style="margin-top: 8px; width: 100%"
              >
                Áp dụng
              </button>
            </div>
            <div style="margin-top: 12px">
              <a class="btn primary" href="thanhtoan.html" style="width: 100%"
                >Tiến hành thanh toán</a
              >
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script src="js/common.js"></script>
    <script>
      function formatVND(n) {
        return "₫" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function getCart() {
        return JSON.parse(localStorage.getItem("mini_cart") || "[]");
      }
      function setCart(c) {
        localStorage.setItem("mini_cart", JSON.stringify(c));
        updateCartCount();
      }

      function updateCartCount() {
        var cart = getCart();
        var count = cart.reduce(function (s, i) {
          return s + (i.qty || 0);
        }, 0);
        var btn = document.querySelector(".cart-btn");
        if (btn) btn.textContent = "Giỏ (" + count + ")";
      }

      function renderCart() {
        var cart = getCart();
        var body = document.getElementById("cartBody");
        body.innerHTML = "";
        if (cart.length === 0) {
          body.innerHTML = '<tr><td colspan="4">Giỏ hàng trống.</td></tr>';
        }
        cart.forEach(function (item) {
          var tr = document.createElement("tr");
          tr.setAttribute("data-id", item.id);
          tr.innerHTML =
            '<td><div style="display:flex;gap:12px;align-items:center">' +
            '<img src="https://via.placeholder.com/120x120?text=SP" alt="' +
            item.title +
            '">' +
            "<div><div>" +
            item.title +
            '</div><div style="color:var(--muted);font-size:0.9rem">Mã: ' +
            item.id +
            "</div></div></div></td>" +
            '<td><input class="qty-input" type="number" value="' +
            (item.qty || 1) +
            '" min="1"></td>' +
            '<td class="price">' +
            (item.price || 0) +
            "</td>" +
            '<td class="subtotal">' +
            (item.qty || 1) * (item.price || 0) +
            "</td>";
          body.appendChild(tr);
        });

        // attach events
        body.querySelectorAll(".qty-input").forEach(function (inp) {
          inp.addEventListener("change", function () {
            if (this.value < 1) this.value = 1;
            var id = parseInt(this.closest("tr").getAttribute("data-id"));
            var cart = getCart();
            var it = cart.find(function (i) {
              return i.id === id;
            });
            if (it) {
              it.qty = parseInt(this.value) || 1;
              setCart(cart);
            }
            recalc();
          });
        });

        // add remove by double-click on row (or future remove button)
        body.querySelectorAll("tr[data-id]").forEach(function (r) {
          r.addEventListener("dblclick", function () {
            var id = parseInt(this.getAttribute("data-id"));
            var cart = getCart().filter(function (i) {
              return i.id !== id;
            });
            setCart(cart);
            renderCart();
            recalc();
            showToast("Sản phẩm đã được xóa khỏi giỏ hàng", "warning");
          });
        });

        recalc();
      }

      function recalc() {
        var cart = getCart();
        var total = cart.reduce(function (s, i) {
          return s + i.price * (i.qty || 0);
        }, 0);
        document.getElementById("subTotal").textContent = formatVND(total);
        document.getElementById("grandTotal").textContent = formatVND(total);
      }

      document
        .getElementById("clearCart")
        .addEventListener("click", function () {
          if (!confirm("Xoá toàn bộ giỏ hàng?")) return;
          localStorage.removeItem("mini_cart");
          renderCart();
          updateCartCount();
          showToast("Giỏ hàng đã được làm trống", "warning");
        });

      document
        .getElementById("applyCoupon")
        .addEventListener("click", function () {
          var code = document.getElementById("coupon").value.trim();
          if (!code) {
            showToast("Nhập mã giảm giá", "info");
            return;
          }
          if (code.toUpperCase() === "MINI10") {
            var subtotal = getCart().reduce(function (s, i) {
              return s + i.price * (i.qty || 0);
            }, 0);
            var discount = Math.round(subtotal * 0.1);
            var grand = subtotal - discount;
            document.getElementById("grandTotal").textContent =
              formatVND(grand);
            showToast("Áp dụng mã thành công - giảm 10%", "success");
          } else showToast("Mã không hợp lệ", "error");
        });

      // initial render
      updateCartCount();
      renderCart();
    </script>
  </body>
</html>
