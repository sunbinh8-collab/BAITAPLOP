<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xác nhận đơn hàng - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html">Đăng nhập</a>
          <a href="dangky.html">Đăng ký</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html">Giỏ (0)</a>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <div>
          <h1>Đơn hàng đã được xác nhận</h1>
          <p>
            Cảm ơn bạn đã tin dùng MiniShop. Đơn hàng của bạn đang được xử lý.
          </p>
        </div>
      </section>

      <section class="products">
        <div
          class="page-transition"
          style="
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
          "
        >
          <h2>Mã đơn hàng</h2>
          <p style="font-size: 1.5rem; font-weight: 700; margin: 12px 0">
            MSH-<span id="orderCode">000123</span>
          </p>
          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 16px;
              margin-top: 20px;
            "
          >
            <div>
              <p><strong>Trạng thái:</strong> Đang xử lý</p>
              <p>
                <strong>Giá trị đơn:</strong> <span id="orderAmount">₫0</span>
              </p>
            </div>
            <div>
              <p><strong>Giao tới:</strong></p>
              <p>Khách hàng MiniShop</p>
            </div>
          </div>
          <div
            style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap"
          >
            <a class="btn primary" href="trangchu.html">Tiếp tục mua sắm</a>
            <a class="btn" href="giohang.html">Xem giỏ hàng</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      function formatVND(n) {
        return "₫" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function updateCartCount() {
        var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
        var count = cart.reduce(function (sum, item) {
          return sum + (item.qty || 0);
        }, 0);
        var btn = document.querySelector(".cart-btn");
        if (btn) btn.textContent = "Giỏ (" + count + ")";
      }

      function refreshOrder() {
        var cart = JSON.parse(localStorage.getItem("mini_last_order") || "[]");
        var total = cart.reduce(function (sum, item) {
          return sum + (item.qty || 0) * (item.price || 0);
        }, 0);
        document.getElementById("orderAmount").textContent = formatVND(
          total + 20000,
        );
        document.getElementById("orderCode").textContent = Math.floor(
          100000 + Math.random() * 899999,
        );
      }

      updateCartCount();
      refreshOrder();
    </script>
  </body>
</html>
