<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quản lý đơn hàng</title>
    <link rel="stylesheet" href="../../css/minishop.css" />
    <link rel="stylesheet" href="../../css/admin.css" />
    <script>
      (function () {
        try {
          var user = JSON.parse(localStorage.getItem("currentUser") || "null");
          if (!user || user.role !== "admin") {
            window.location.replace("../../html/dangnhap.html");
          }
        } catch (e) {
          window.location.replace("../../html/dangnhap.html");
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="../../html/trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="./quanly.html">Dashboard</a>
          <a href="../../html/trangchu.html">Trang chủ</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <h1>Quản lý đơn hàng</h1>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Mã</th>
            <th>Khách</th>
            <th>Trạng thái</th>
            <th>Ngày</th>
            <th>Tổng</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
        </tbody>
      </table>
    <script src="../../js/common.js"></script>
    <script>
      function getOrders() {
        return JSON.parse(localStorage.getItem('mini_orders') || '[]');
      }

      function formatVND(n) {
        return '₫' + Number(n || 0).toLocaleString();
      }

      function renderAdminOrders() {
        var tbody = document.querySelector('.admin-table tbody');
        var orders = getOrders();
        if (!orders.length) {
          tbody.innerHTML = '<tr><td colspan="4" style="padding:18px;text-align:center;color:var(--muted)">Chưa có đơn hàng.</td></tr>';
          return;
        }
        tbody.innerHTML = orders.map(function (o) {
          var cancelledNote = '';
          var actions = [];
          if (o.status && o.status.toString().toLowerCase().indexOf('hủy') !== -1) {
            cancelledNote = o.cancelledAt ? '<div style="font-size:0.85rem;color:var(--muted)">Hủy: ' + new Date(o.cancelledAt).toLocaleString() + '</div>' : '';
            actions.push('<button class="btn" data-id="' + o.id + '" data-action="undo">Hoàn tác</button>');
            actions.push('<button class="btn danger" data-id="' + o.id + '" data-action="refund">Hoàn tiền</button>');
          }
          return '<tr>' +
            '<td>' + (o.id || '') + '</td>' +
            '<td>' + ((o.recipient && o.recipient.name) ? o.recipient.name : 'Khách lạ') + '</td>' +
            '<td>' + (o.status || '') + cancelledNote + '</td>' +
            '<td>' + (o.createdAt || '') + '</td>' +
            '<td>' + formatVND(o.total) + '</td>' +
            '<td>' + (actions.join(' ') || '') + '</td>' +
            '</tr>';
        }).join('');

        // attach handlers
        tbody.querySelectorAll('button[data-action]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var id = this.getAttribute('data-id');
            var act = this.getAttribute('data-action');
            if (act === 'undo') return undoCancel(id);
            if (act === 'refund') return refundOrder(id);
          });
        });
      }

      function undoCancel(id) {
        var orders = getOrders();
        var idx = orders.findIndex(function (o) { return (o.id||'').toString() === (id||'').toString(); });
        if (idx === -1) return showToast('Đơn không tồn tại', 'error');
        var prev = orders[idx].previousStatus || 'Đang xử lý';
        orders[idx].status = prev;
        delete orders[idx].cancelledAt;
        delete orders[idx].previousStatus;
        localStorage.setItem('mini_orders', JSON.stringify(orders));
        showToast('Đã hoàn tác hủy đơn MSH-' + id, 'success');
        renderAdminOrders();
      }

      function refundOrder(id) {
        // placeholder: real refund flow not implemented
        if (!confirm('Xác nhận gửi yêu cầu hoàn tiền cho đơn MSH-' + id + '?')) return;
        showToast('Yêu cầu hoàn tiền đã được gửi (mô phỏng)', 'info');
      }

      renderAdminOrders();
    </script>
    </main>
  </body>
</html>
