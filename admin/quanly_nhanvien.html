<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Quản lý nhân viên</title>
    <link rel="stylesheet" href="../css/minishop.css">
    <link rel="stylesheet" href="../css/admin.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="../trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="./quanly.html">Dashboard</a>
          <a href="../trangchu.html">Trang chủ</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <h1>Quản lý nhân viên</h1>
      <div class="admin-actions">
        <a class="btn" href="./quanly.html">Quay về Dashboard</a>
      </div>
      <form id="staffForm" class="admin-form">
        <input id="staffName" placeholder="Tên nhân viên" required>
        <input id="staffRole" placeholder="Chức vụ" required>
        <input id="staffEmail" placeholder="Email" type="email" required>
        <button class="btn" type="submit">Thêm nhân viên</button>
      </form>
      <table id="staffTable" class="admin-table">
        <thead><tr><th>ID</th><th>Tên</th><th>Chức vụ</th><th>Email</th><th>Hành động</th></tr></thead>
        <tbody></tbody>
      </table>
    </main>
    <script src="./js/quanly_nhanvien.js"></script>
  </body>
</html>
