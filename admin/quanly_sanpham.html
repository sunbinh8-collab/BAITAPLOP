<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" href="../css/minishop.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <script>
      (function () {
        try {
          var user = JSON.parse(localStorage.getItem("currentUser") || "null");
          if (!user || user.role !== "admin") {
            window.location.replace("../dangnhap.html");
          }
        } catch (e) {
          window.location.replace("../dangnhap.html");
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="../trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="./quanly.html">Dashboard</a>
          <a href="../trangchu.html">Trang chủ</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1>Quản lý sản phẩm</h1>

      <div class="filter-section">
        <label>Lọc theo danh mục:</label>
        <select id="categoryFilter" onchange="filterByCategory()">
          <option value="">Tất cả</option>
          <option value="Thời trang" selected>Thời trang</option>

          <option value="Khác">Khác</option>
        </select>
      </div>

      <h3>Thêm sản phẩm mới</h3>
      <form id="productForm" class="admin-form">
        <input id="pName" placeholder="Tên sản phẩm" required />
        <input id="pPrice" placeholder="Giá (số)" type="number" required />
        <select id="pCategory" required>
          <option value="">-- Chọn danh mục --</option>
          <option value="Thời trang" selected>Thời trang</option>
          <option value="Khác">Khác</option>
        </select>
        <input id="pImage" placeholder="Đường dẫn ảnh (tùy chọn)" />
        <button class="btn" type="submit">Thêm</button>
      </form>

      <h3>Danh sách sản phẩm</h3>
      <table id="productsTable" class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Tên</th>
            <th>Giá</th>
            <th>Danh mục</th>
            <th>Ảnh</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <style>
        .filter-section {
          margin-bottom: 20px;
          padding: 15px;
          background-color: #f5f5f5;
          border-radius: 5px;
        }
        .filter-section label {
          font-weight: bold;
          margin-right: 10px;
        }
        .filter-section select {
          padding: 8px 12px;
          border: 1px solid #ddd;
          border-radius: 4px;
          font-size: 14px;
          min-width: 200px;
        }
        .admin-form {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 10px;
          margin-bottom: 20px;
        }
        .admin-form input,
        .admin-form select {
          padding: 10px;
          border: 1px solid #ddd;
          border-radius: 4px;
          font-size: 14px;
        }
        .admin-form .btn {
          background-color: #28a745;
          color: white;
          border: none;
          padding: 10px 20px;
          border-radius: 4px;
          cursor: pointer;
          font-weight: bold;
        }
        .admin-form .btn:hover {
          background-color: #218838;
        }
      </style>
    </main>

    <script src="./js/quanly_products.js"></script>
  </body>
</html>
