<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng ký tài khoản - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
    
    <style>
      /* --- HỆ THỐNG DESIGN SYSTEM ĐỒNG BỘ --- */
      :root {
        --primary-color: #ff4757;
        --primary-hover: #ee3848;
        --text-color: #2f3542;
        --text-muted: #747d8c;
        --border-color: #e4e7eb;
        --bg-light: #f8f9fa;
        --radius-md: 10px;
        --radius-lg: 14px;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 15px rgba(0, 0, 0, 0.08);
        --transition: all 0.25s ease;
      }

      body {
        background-color: #f7f9fa;
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 15px;
      }

      /* === SITE HEADER === */
      .site-header {
        background: #fff;
        box-shadow: var(--shadow-sm);
        padding: 15px 0;
      }
      .header-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 24px;
        font-weight: 700;
        color: var(--primary-color);
        text-decoration: none;
      }
      .main-nav a {
        color: var(--text-color);
        text-decoration: none;
        margin-right: 20px;
        font-weight: 500;
        transition: var(--transition);
      }
      .main-nav a:hover, .main-nav a.active { color: var(--primary-color); }
      
      .cart-btn {
        background: var(--primary-color);
        color: #fff;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 600;
      }

      /* === ĐĂNG KÝ FORM CARD === */
      .register-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        margin: 40px 0;
      }

      .form-card {
        background: #fff;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        padding: 40px;
        border: 1px solid var(--border-color);
        width: 100%;
        max-width: 450px;
      }

      .form-card h2 {
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0 0 8px 0;
        text-align: center;
      }

      .form-card .subtitle {
        color: var(--text-muted);
        text-align: center;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
      }

      .form-field label {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-color);
      }

      /* Khung bao bọc input để định vị nút tương đối */
      .input-group-wrapper {
        position: relative;
        width: 100%;
        display: flex;
        align-items: center;
      }

      .input-group-wrapper input {
        width: 100%;
        padding: 12px 60px 12px 14px; /* Chừa 60px bên phải để tránh chữ đè lên nút HIỆN/ẨN */
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        outline: none;
        font-size: 0.95rem;
        background: #fff;
        transition: var(--transition);
        box-sizing: border-box;
      }

      .input-group-wrapper input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
      }

      /* NÚT ẨN/HIỆN ĐƯỢC THIẾT KẾ CĂN GIỮA TUYỆT ĐỐI */
      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%); /* Đảm bảo nút luôn luôn căn giữa theo chiều dọc */
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 700;
        padding: 6px; /* Tạo vùng bấm rộng hơn cho dễ click */
        transition: var(--transition);
        z-index: 5;
        user-select: none;
      }
      .password-toggle:hover {
        color: var(--primary-color);
      }

      .form-actions {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 24px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-color);
        cursor: pointer;
        transition: var(--transition);
        text-decoration: none;
        width: 100%;
        box-sizing: border-box;
      }

      .btn.primary {
        background: var(--text-color);
        color: #fff;
        border: none;
      }
      .btn.primary:hover {
        background: #1e222b;
      }

      .small-link {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        text-align: center;
        transition: var(--transition);
      }
      .small-link:hover {
        text-decoration: underline;
      }

      /* === TOAST === */
      .toast-msg { 
        position: fixed; 
        bottom: 24px; 
        left: 50%; 
        transform: translateX(-50%) translateY(100px); 
        background: rgba(47, 53, 66, 0.95); 
        color: #fff; 
        padding: 12px 24px; 
        border-radius: 30px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        z-index: 9999; 
        font-weight: 500; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; 
        opacity: 0; 
      }
      .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
      .toast-msg.error { background: #ff4757; }
    </style>
  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html">Đăng nhập</a>
          <a class="active" href="dangky.html">Đăng ký</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html" id="headerCartBtn">Giỏ (0)</a>
      </div>
    </header>

    <main class="container">
      <div class="register-wrap">
        <div class="form-card">
          <h2>Đăng ký tài khoản</h2>
          <div class="subtitle">Trở thành thành viên của MiniShop ngay hôm nay</div>
          
          <form id="registerForm">
            <div class="form-field">
              <label for="name">Họ và tên</label>
              <div class="input-group-wrapper">
                <input id="name" name="name" type="text" placeholder="Nhập đầy đủ họ tên" required />
              </div>
            </div>
            
            <div class="form-field">
              <label for="email">Email</label>
              <div class="input-group-wrapper">
                <input id="email" name="email" type="email" placeholder="minishop@gmail.com" required />
              </div>
            </div>
            
            <div class="form-field">
              <label for="password">Mật khẩu</label>
              <div class="input-group-wrapper">
                <input id="password" name="password" type="password" placeholder="Tối thiểu 6 ký tự" minlength="6" required />
                <button type="button" class="password-toggle" id="togglePassword">HIỆN</button>
              </div>
            </div>
            
            <div class="form-field">
              <label for="confirm">Xác nhận mật khẩu</label>
              <div class="input-group-wrapper">
                <input id="confirm" name="confirm" type="password" placeholder="Nhập lại mật khẩu" minlength="6" required />
                <button type="button" class="password-toggle" id="toggleConfirm">HIỆN</button>
              </div>
            </div>
            
            <div class="form-actions">
              <button class="btn primary" type="submit">Tạo tài khoản</button>
              <a class="small-link" href="dangnhap.html">Bạn đã có tài khoản? Đăng nhập ngay</a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <div class="footer-bottom" style="border-top: 1px solid var(--border-color); margin-top: 30px; padding-top: 20px; text-align: center; color: var(--text-muted);">
          <div style="margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px;">
            © 2026 <span style="color: var(--primary-color); font-weight: 600;">MiniShop</span>. All rights reserved. Powered by HTML5 & CSS3.
          </div>
          <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <img src="images/payment-methods.png" alt="Phương thức thanh toán" style="max-height: 24px; opacity: 0.6; filter: grayscale(100%);" onerror="this.style.display='none'">
          </div>
        </div>

    <script>
      function showToast(message, type = "success") {
        var oldToast = document.querySelector(".toast-msg");
        if (oldToast) oldToast.remove();
        
        var toast = document.createElement("div");
        toast.className = "toast-msg" + (type === "error" ? " error" : "");
        toast.innerHTML = (type === "error" ? "✕ " : "✓ ") + message;
        document.body.appendChild(toast);
        
        setTimeout(function () { toast.classList.add("show"); }, 50);
        setTimeout(function () { 
          toast.classList.remove("show"); 
          setTimeout(function () { toast.remove(); }, 300); 
        }, 3000);
      }

      function updateCartCount() {
        var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
        var count = cart.reduce(function (sum, item) { return sum + (item.qty || 0); }, 0);
        var cartBtn = document.getElementById("headerCartBtn");
        if (cartBtn) cartBtn.textContent = "Giỏ (" + count + ")";
      }

      // Xử lý bật/tắt ẩn hiện mật khẩu
      function initPasswordToggle(inputId, toggleId) {
        var input = document.getElementById(inputId);
        var toggle = document.getElementById(toggleId);
        if (input && toggle) {
          toggle.addEventListener("click", function () {
            if (input.type === "password") {
              input.type = "text";
              toggle.textContent = "ẨN";
            } else {
              input.type = "password";
              toggle.textContent = "HIỆN";
            }
          });
        }
      }
      initPasswordToggle("password", "togglePassword");
      initPasswordToggle("confirm", "toggleConfirm");

      // Định dạng ngày hôm nay (dd/mm/yyyy)
      function getFormattedDate() {
        var today = new Date();
        var dd = String(today.getDate()).padStart(2, '0');
        var mm = String(today.getMonth() + 1).padStart(2, '0');
        var yyyy = today.getFullYear();
        return dd + '/' + mm + '/' + yyyy;
      }

      // Logic Đăng ký tài khoản hệ thống
      document.getElementById("registerForm").addEventListener("submit", function (e) {
        e.preventDefault();
        
        var name = document.getElementById("name").value.trim();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;
        var confirm = document.getElementById("confirm").value;

        // 1. Kiểm tra khớp mật khẩu
        if (password !== confirm) {
          showToast("Xác nhận mật khẩu không trùng khớp!", "error");
          return;
        }

        // Lấy danh sách tài khoản đã có hoặc tạo mảng rỗng
        var users = JSON.parse(localStorage.getItem("mini_users") || "[]");

        // 2. Kiểm tra xem Email đã tồn tại hay chưa
        var emailExists = users.some(function(user) {
          return user.email.toLowerCase() === email.toLowerCase();
        });

        if (emailExists) {
          showToast("Email này đã được đăng ký trên hệ thống!", "error");
          return;
        }

        // 3. Tiến hành đăng ký: Tạo tài khoản mới
        var newUser = {
          name: name,
          email: email,
          password: password,
          role: "user" // Mặc định là khách hàng thường
        };

        users.push(newUser);
        localStorage.setItem("mini_users", JSON.stringify(users));

        // 4. Lưu đồng thời tài khoản đang đăng nhập để tự động login
        localStorage.setItem("currentUser", JSON.stringify(newUser));

        // 5. Khởi tạo hồ sơ thông tin cá nhân rỗng tương ứng
        var profileData = {
          name: name,
          email: email,
          phone: "Chưa cập nhật",
          address: "Chưa cập nhật",
          join: getFormattedDate(),
          bio: "Khách hàng thân thiết của MiniShop."
        };
        localStorage.setItem("mini_profile", JSON.stringify(profileData));

        showToast("Đăng ký tài khoản thành công!", "success");

        // Chuyển hướng sang trang tài khoản sau 1.2 giây
        setTimeout(function() {
          window.location.href = "taikhoan.html";
        }, 1200);
      });

      updateCartCount();
    </script>
  </body>
</html>
