<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng ký - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
      </div>
    </header>

    <main class="container">
      <div class="form-card">
        <h2>Đăng ký</h2>
        <form id="registerForm">
          <div class="form-field">
            <label for="name">Họ và tên</label>
            <input id="name" name="name" type="text" required />
          </div>
          <div class="form-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="form-field">
            <label for="password">Mật khẩu</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              minlength="6"
            />
          </div>
          <div class="form-field">
            <label for="confirm">Xác nhận mật khẩu</label>
            <input
              id="confirm"
              name="confirm"
              type="password"
              required
              minlength="6"
            />
          </div>
          <div class="form-actions">
            <button class="btn primary" type="submit">Tạo tài khoản</button>
            <a class="small-link" href="dangnhap.html">Đã có tài khoản?</a>
          </div>
        </form>
      </div>
    </main>

    <script src="js/common.js"></script>
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var p = document.getElementById("password").value;
          var c = document.getElementById("confirm").value;
          if (p !== c) {
            showToast("Mật khẩu không khớp", "error");
            return;
          }
          showToast(
            "Đăng ký giả lập: " + document.getElementById("email").value,
            "success",
          );
          window.location.href = "taikhoan.html";
        });
    </script>
  </body>
</html>
