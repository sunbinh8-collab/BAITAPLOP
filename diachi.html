<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sổ địa chỉ - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
    
    <style>
      /* --- HỆ THỐNG DESIGN SYSTEM ĐỒNG BỘ --- */
      :root {
        --primary-color: #ff4757;
        --primary-hover: #ee3848;
        --secondary-color: #2ed573;
        --text-color: #2f3542;
        --text-muted: #747d8c;
        --border-color: #f1f2f6;
        --bg-light: #f8f9fa;
        --radius-md: 10px;
        --radius-lg: 14px;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 15px rgba(0, 0, 0, 0.08);
        --transition: all 0.25s ease;
      }

      body {
        background-color: #f7f9fa;
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 15px;
      }

      /* === SITE HEADER === */
      .site-header {
        background: #fff;
        box-shadow: var(--shadow-sm);
        padding: 15px 0;
      }
      .header-inner { display: flex; justify-content: space-between; align-items: center; }
      .logo { font-size: 24px; font-weight: 700; color: var(--primary-color); text-decoration: none; }
      .main-nav a {
        color: var(--text-color); text-decoration: none; margin-right: 20px; font-weight: 500; transition: var(--transition);
      }
      .main-nav a:hover, .main-nav a.active { color: var(--primary-color); }
      .cart-btn {
        background: var(--primary-color); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-weight: 600;
      }

      /* Layout hai cột Tài khoản */
      .account-wrap {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 30px;
        margin: 40px auto;
      }

      @media (max-width: 768px) {
        .account-wrap { grid-template-columns: 1fr; gap: 20px; }
      }

      /* Thanh menu tài khoản bên trái */
      .account-aside .aside-card {
        background: #fff;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        padding: 10px;
        border: 1px solid var(--border-color);
      }
      .account-aside nav { display: flex; flex-direction: column; gap: 4px; }
      .account-aside nav a {
        display: block; padding: 12px 16px; color: var(--text-color); text-decoration: none; font-weight: 500; border-radius: 6px; transition: var(--transition); font-size: 0.95rem;
      }
      .account-aside nav a:hover, .account-aside nav a.active {
        background-color: #ffe0e3; color: var(--primary-color);
      }

      /* Panel hiển thị địa chỉ bên phải */
      .account-panel {
        background: #fff;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        padding: 24px;
        border: 1px solid var(--border-color);
      }
      .panel-header {
        display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 2px solid var(--border-color); margin-bottom: 24px;
      }
      .panel-header h2 { font-size: 1.4rem; font-weight: 700; margin: 0; }

      /* Khối card địa chỉ */
      .address-card {
        border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 18px; margin-bottom: 16px; position: relative; transition: var(--transition); background: #fff;
      }
      .address-card:hover { box-shadow: var(--shadow-sm); }
      .address-info-row { margin-bottom: 6px; font-size: 0.95rem; }
      .user-name { font-weight: 600; font-size: 1.05rem; color: var(--text-color); }
      .phone-num { color: var(--text-muted); margin-left: 10px; }
      .address-detail { color: #57606f; margin-top: 4px; line-height: 1.5; }

      /* Badge Mặc định */
      .badge-default {
        display: inline-block; background-color: #ffe0e3; color: var(--primary-color); font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-top: 8px; border: 1px solid #ffe0e3;
      }
      .address-actions { position: absolute; top: 18px; right: 18px; }

      /* === BUTTONS === */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; padding: 10px 18px; font-size: 0.9rem; font-weight: 600; border-radius: 6px; border: 1px solid var(--border-color); background: #fff; color: var(--text-color); cursor: pointer; text-decoration: none; transition: var(--transition);
      }
      .btn:hover { background: var(--bg-light); }
      .btn.primary { background: var(--text-color); color: #fff; border: none; }
      .btn.primary:hover { background: #1e222b; }
      
      .btn-delete-text { background: none; border: none; color: var(--primary-color); font-weight: 600; font-size: 0.88rem; cursor: pointer; font-family: inherit; }
      .btn-delete-text:hover { text-decoration: underline; }
      .empty-state { padding: 40px; border: 2px dashed #ced6e0; border-radius: var(--radius-md); text-align: center; color: var(--text-muted); font-weight: 500; }

      /* === MODAL FORM POPUP === */
      .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1200; }
      .modal-overlay.active { display: flex; }
      .address-modal { width: min(500px, 100%); background: #fff; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-md); animation: slideUp 0.25s ease-out; }
      @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; color: var(--text-color); }
      .form-group { margin-bottom: 16px; }
      .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
      .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border-color); border-radius: 6px; outline: none; font-size: 0.9rem; font-family: inherit; box-sizing: border-box; }
      .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-color); }
      .checkbox-group { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
      .checkbox-group input { width: auto; cursor: pointer; }
      .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    </style>
  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html" id="navLoginLink">Đăng nhập</a>
          <a href="dangky.html" id="navRegisterLink">Đăng ký</a>
          <a class="active" href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html" id="headerCartBtn">Giỏ hàng (0)</a>
      </div>
    </header>

    <div id="addressModal" class="modal-overlay">
      <div class="address-modal" role="dialog" aria-modal="true">
        <div class="modal-title">Thêm địa chỉ nhận hàng mới</div>
        <form id="addressForm">
          <div class="form-group">
            <label for="fullName">Họ và tên người nhận</label>
            <input type="text" id="fullName" required placeholder="VD: Nguyễn Văn A" />
          </div>
          <div class="form-group">
            <label for="phone">Số điện thoại liên hệ</label>
            <input type="tel" id="phone" required placeholder="VD: 0912345678" />
          </div>
          <div class="form-group">
            <label for="fullAddress">Địa chỉ chi tiết</label>
            <textarea id="fullAddress" rows="3" required placeholder="Số nhà, tên đường, phường/xã, tỉnh/thành phố..."></textarea>
          </div>
          <div class="form-group">
            <label class="checkbox-group">
              <input type="checkbox" id="isDefault" /> Đặt làm địa chỉ mặc định
            </label>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn" id="btnCancel">Hủy bỏ</button>
            <button type="submit" class="btn primary">Lưu địa chỉ</button>
          </div>
        </form>
      </div>
    </div>

    <main class="container">
      <div class="account-wrap">
        <aside class="account-aside">
          <div class="aside-card">
            <nav>
              <a href="taikhoan.html" data-panel="profile">Hồ sơ cá nhân</a>
              <a href="hoadon.html" data-panel="orders">Đơn hàng của tôi</a>
              <a href="diachi.html" class="active" data-panel="addresses">Địa chỉ</a>
              <a href="phuongthucthanhtoan.html" data-panel="payments">Phương thức thanh toán</a>
              <a href="yeuthich.html" data-panel="favorites">Danh sách yêu thích</a>
              <a href="#" id="asideLogout" style="color: var(--primary-color);">Đăng xuất</a>
            </nav>
          </div>
        </aside>

        <section class="account-main">
          <div class="account-panel">
            <div class="panel-header">
              <h2>Địa chỉ nhận hàng</h2>
              <button class="btn primary" id="btnAddNewAddress">+ Thêm địa chỉ mới</button>
            </div>
            
            <div id="addressListContainer"></div>
          </div>
        </section>
      </div>
    </main>

    <div class="footer-bottom" style="border-top: 1px solid var(--border-color); margin-top: 30px; padding-top: 20px; text-align: center; color: var(--text-muted);">
          <div style="margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px;">
            © 2026 <span style="color: var(--primary-color); font-weight: 600;">MiniShop</span>. All rights reserved. Powered by HTML5 & CSS3.
          </div>
          <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <img src="images/payment-methods.png" alt="Phương thức thanh toán" style="max-height: 24px; opacity: 0.6; filter: grayscale(100%);" onerror="this.style.display='none'">
          </div>
        </div>

    <script>
      function updateCartCount() {
        var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
        var count = cart.reduce(function (sum, item) { return sum + (item.qty || 0); }, 0);
        var btn = document.getElementById("headerCartBtn");
        if (btn) btn.textContent = "Giỏ (" + count + ")";
      }

      // --- BẢO VỆ TUYẾN ĐƯỜNG (KIỂM TRA ĐĂNG NHẬP) ---
      var currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");
      if (!currentUser) {
        window.location.href = "dangnhap.html";
      }

      // --- ĐỒNG BỘ TRẠNG THÁI ĐĂNG NHẬP TRÊN HEADER ---
      if (currentUser) {
        var navLogin = document.getElementById("navLoginLink");
        var navRegister = document.getElementById("navRegisterLink");
        
        if (navLogin) { navLogin.textContent = currentUser.name; navLogin.href = "taikhoan.html"; }
        if (navRegister) {
          navRegister.textContent = "Đăng xuất"; navRegister.href = "#";
          navRegister.addEventListener("click", handleLogout);
        }
      }

      function handleLogout(e) {
        if(e) e.preventDefault();
        localStorage.removeItem("currentUser");
        localStorage.removeItem("mini_profile");
        window.location.href = "dangnhap.html";
      }
      document.getElementById("asideLogout").addEventListener("click", handleLogout);

      // --- KHỞI TẠO DỮ LIỆU SỔ ĐỊA CHỈ ---
      var defaultAddresses = [
        { id: 1, name: currentUser ? currentUser.name : "Nguyễn Văn A", phone: "0912345678", address: "Số 85 Đường Xuân Thủy, Phường Cầu Giấy, TP. Hà Nội", isDefault: true }
      ];

      function getAddresses() {
        var stored = localStorage.getItem("mini_addresses");
        if (!stored) {
          localStorage.setItem("mini_addresses", JSON.stringify(defaultAddresses));
          return defaultAddresses;
        }
        return JSON.parse(stored);
      }

      // Hàm đồng bộ địa chỉ mặc định sang Object hồ sơ mini_profile chính
      function syncDefaultAddressToProfile(defaultItem) {
        var profile = JSON.parse(localStorage.getItem("mini_profile") || "{}");
        if(defaultItem) {
          profile.name = defaultItem.name;
          profile.phone = defaultItem.phone;
          profile.address = defaultItem.address;
          localStorage.setItem("mini_profile", JSON.stringify(profile));
        }
      }

      function setAddresses(arr) {
        localStorage.setItem("mini_addresses", JSON.stringify(arr));
        
        // Tìm địa chỉ mặc định hiện tại để đồng bộ điền sẵn trang thanh toán
        var defaultAddress = arr.find(function(i) { return i.isDefault; });
        if (defaultAddress) {
          syncDefaultAddressToProfile(defaultAddress);
        }
        renderAddresses();
      }

      function renderAddresses() {
        var container = document.getElementById("addressListContainer");
        var list = getAddresses();

        if (list.length === 0) {
          container.innerHTML = '<div class="empty-state">Sổ địa chỉ của bạn đang trống. Vui lòng thêm địa chỉ để thuận tiện cho việc mua hàng.</div>';
          return;
        }

        list.sort(function(a, b) { return b.isDefault - a.isDefault; });

        container.innerHTML = list.map(function (item) {
          var defaultBadge = item.isDefault ? '<br><span class="badge-default">Địa chỉ mặc định</span>' : '';
          return `
            <div class="address-card">
              <div class="address-info-row">
                <span class="user-name">${item.name}</span>
                <span class="phone-num">📱 ${item.phone}</span>
              </div>
              <div class="address-detail">📍 ${item.address}</div>
              ${defaultBadge}
              <div class="address-actions">
                <button class="btn-delete-text" onclick="deleteAddress(${item.id})">Xóa</button>
              </div>
            </div>
          `;
        }).join("");
      }

      window.deleteAddress = function(id) {
        if (confirm("Bạn có chắc chắn muốn xóa địa chỉ nhận hàng này không?")) {
          var list = getAddresses();
          var itemToDelete = list.find(function(i) { return i.id === id; });
          
          list = list.filter(function(i) { return i.id !== id; });
          
          if (itemToDelete && itemToDelete.isDefault && list.length > 0) {
            list[0].isDefault = true;
          } else if (list.length === 0) {
            // Nếu xóa hết địa chỉ, reset thông tin profile về trống
            var profile = JSON.parse(localStorage.getItem("mini_profile") || "{}");
            profile.address = "Chưa cập nhật";
            localStorage.setItem("mini_profile", JSON.stringify(profile));
          }
          
          setAddresses(list);
        }
      }

      var modal = document.getElementById("addressModal");
      var form = document.getElementById("addressForm");

      document.getElementById("btnAddNewAddress").addEventListener("click", function() {
        modal.classList.add("active");
      });

      document.getElementById("btnCancel").addEventListener("click", function() {
        modal.classList.remove("active");
        form.reset();
      });

      form.addEventListener("submit", function(e) {
        e.preventDefault();
        var name = document.getElementById("fullName").value.trim();
        var phone = document.getElementById("phone").value.trim();
        var address = document.getElementById("fullAddress").value.trim();
        var isDefault = document.getElementById("isDefault").checked;

        var list = getAddresses();

        if (isDefault || list.length === 0) {
          isDefault = true;
          list.forEach(function(i) { i.isDefault = false; });
        }

        var newAddress = {
          id: Date.now(),
          name: name,
          phone: phone,
          address: address,
          isDefault: isDefault
        };

        list.push(newAddress);
        setAddresses(list);
        
        modal.classList.remove("active");
        form.reset();
      });

      updateCartCount();
      renderAddresses();
    </script>
  </body>
</html>
