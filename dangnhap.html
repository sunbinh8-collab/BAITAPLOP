<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
    
    <style>
      /* --- HỆ THỐNG DESIGN SYSTEM ĐỒNG BỘ --- */
      :root {
        --primary-color: #ff4757;
        --primary-hover: #ee3848;
        --text-color: #2f3542;
        --text-muted: #747d8c;
        --border-color: #e4e7eb;
        --bg-light: #f8f9fa;
        --radius-md: 10px;
        --radius-lg: 14px;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 15px rgba(0, 0, 0, 0.08);
        --transition: all 0.25s ease;
      }

      body {
        background-color: #f7f9fa;
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 15px;
      }

      /* === SITE HEADER === */
      .site-header {
        background: #fff;
        box-shadow: var(--shadow-sm);
        padding: 15px 0;
      }
      .header-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 24px;
        font-weight: 700;
        color: var(--primary-color);
        text-decoration: none;
      }
      .main-nav a {
        color: var(--text-color);
        text-decoration: none;
        margin-right: 20px;
        font-weight: 500;
        transition: var(--transition);
      }
      .main-nav a:hover, .main-nav a.active { color: var(--primary-color); }
      
      .cart-btn {
        background: var(--primary-color);
        color: #fff;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 600;
      }

      /* === FORM CARD ĐĂNG NHẬP === */
      .login-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        margin: 40px 0;
      }

      .form-card {
        background: #fff;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        padding: 40px;
        border: 1px solid var(--border-color);
        width: 100%;
        max-width: 450px;
      }

      .form-card h2 {
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0 0 8px 0;
        text-align: center;
      }

      .form-card .subtitle {
        color: var(--text-muted);
        text-align: center;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
      }

      .form-field label {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-color);
      }

      /* Khung bao bọc input cố định vị trí */
      .input-group-wrapper {
        position: relative;
        width: 100%;
        display: flex;
        align-items: center;
      }

      .input-group-wrapper input {
        width: 100%;
        padding: 12px 60px 12px 14px; /* Tránh đè lên chữ HIỆN */
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        outline: none;
        font-size: 0.95rem;
        background: #fff;
        transition: var(--transition);
        box-sizing: border-box;
      }

      .input-group-wrapper input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
      }

      /* Nút HIỆN/ẨN căn giữa tuyệt đối */
      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 700;
        padding: 6px;
        transition: var(--transition);
        z-index: 5;
        user-select: none;
      }
      .password-toggle:hover {
        color: var(--primary-color);
      }

      .form-actions {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 24px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-color);
        cursor: pointer;
        transition: var(--transition);
        text-decoration: none;
        width: 100%;
        box-sizing: border-box;
      }

      .btn.primary {
        background: var(--text-color);
        color: #fff;
        border: none;
      }
      .btn.primary:hover {
        background: #1e222b;
      }

      .small-link {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        text-align: center;
        transition: var(--transition);
      }
      .small-link:hover {
        text-decoration: underline;
      }

      /* === TOAST === */
      .toast-msg { 
        position: fixed; 
        bottom: 24px; 
        left: 50%; 
        transform: translateX(-50%) translateY(100px); 
        background: rgba(47, 53, 66, 0.95); 
        color: #fff; 
        padding: 12px 24px; 
        border-radius: 30px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        z-index: 9999; 
        font-weight: 500; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; 
        opacity: 0; 
      }
      .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
      .toast-msg.error { background: #ff4757; }
    </style>
  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a class="active" href="dangnhap.html" id="navLoginLink">Đăng nhập</a>
          <a href="dangky.html" id="navRegisterLink">Đăng ký</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html" id="headerCartBtn">Giỏ (0)</a>
      </div>
    </header>

    <main class="container">
      <div class="login-wrap">
        <div class="form-card">
          <h2>Đăng nhập</h2>
          <div class="subtitle">Chào mừng bạn quay lại với hệ thống MiniShop</div>
          
          <form id="loginForm">
            <div class="form-field">
              <label for="email">Email</label>
              <div class="input-group-wrapper">
                <input id="email" name="email" type="email" placeholder="minishop@gmail.com" required />
              </div>
            </div>
            
            <div class="form-field">
              <label for="password">Mật khẩu</label>
              <div class="input-group-wrapper">
                <input id="password" name="password" type="password" placeholder="Nhập mật khẩu của bạn" minlength="6" required />
                <button type="button" class="password-toggle" id="togglePassword">HIỆN</button>
              </div>
            </div>
            
            <div class="form-actions">
              <button class="btn primary" type="submit">Đăng nhập</button>
              <a class="small-link" href="dangky.html">Chưa có tài khoản? Đăng ký ngay</a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <div class="footer-bottom" style="border-top: 1px solid var(--border-color); margin-top: 30px; padding-top: 20px; text-align: center; color: var(--text-muted);">
          <div style="margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px;">
            © 2026 <span style="color: var(--primary-color); font-weight: 600;">MiniShop</span>. All rights reserved. Powered by HTML5 & CSS3.
          </div>
          <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <img src="images/payment-methods.png" alt="Phương thức thanh toán" style="max-height: 24px; opacity: 0.6; filter: grayscale(100%);" onerror="this.style.display='none'">
          </div>
        </div>

    <script>
      function showToast(message, type = "success") {
        var oldToast = document.querySelector(".toast-msg");
        if (oldToast) oldToast.remove();
        
        var toast = document.createElement("div");
        toast.className = "toast-msg" + (type === "error" ? " error" : "");
        toast.innerHTML = (type === "error" ? "✕ " : "✓ ") + message;
        document.body.appendChild(toast);
        
        setTimeout(function () { toast.classList.add("show"); }, 50);
        setTimeout(function () { 
          toast.classList.remove("show"); 
          setTimeout(function () { toast.remove(); }, 300); 
        }, 3000);
      }

      function updateCartCount() {
        var cart = JSON.parse(localStorage.getItem("mini_cart") || "[]");
        var count = cart.reduce(function (sum, item) { return sum + (item.qty || 0); }, 0);
        var cartBtn = document.getElementById("headerCartBtn");
        if (cartBtn) cartBtn.textContent = "Giỏ (" + count + ")";
      }

      // --- ĐỒNG BỘ TRẠNG THÁI ĐĂNG NHẬP TRÊN HEADER ---
      var sessionUser = JSON.parse(localStorage.getItem("currentUser") || "null");
      if (sessionUser) {
        var navLogin = document.getElementById("navLoginLink");
        var navRegister = document.getElementById("navRegisterLink");
        
        if (navLogin) {
          navLogin.textContent = sessionUser.name;
          navLogin.href = "taikhoan.html";
        }
        if (navRegister) {
          navRegister.textContent = "Đăng xuất";
          navRegister.href = "#";
          navRegister.addEventListener("click", function (e) {
            e.preventDefault();
            localStorage.removeItem("currentUser");
            localStorage.removeItem("mini_profile");
            window.location.reload();
          });
        }
      }

      // Xử lý bật/tắt ẩn hiện mật khẩu
      var inputPass = document.getElementById("password");
      var btnToggle = document.getElementById("togglePassword");
      if (inputPass && btnToggle) {
        btnToggle.addEventListener("click", function () {
          if (inputPass.type === "password") {
            inputPass.type = "text";
            btnToggle.textContent = "ẨN";
          } else {
            inputPass.type = "password";
            btnToggle.textContent = "HIỆN";
          }
        });
      }

      // Logic xử lý Đăng nhập
      document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();
        
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;

        // 1. Kiểm tra tài khoản Admin mặc định
        if (email === "admin@minishop.com" && password === "admin123") {
          var adminUser = {
            name: "Quản trị viên",
            email: email,
            role: "admin"
          };
          localStorage.setItem("currentUser", JSON.stringify(adminUser));
          
          showToast("Đăng nhập quyền Quản trị thành công!", "success");
          setTimeout(function () {
            window.location.href = "taikhoan.html";
          }, 1000);
          return;
        }

        // 2. Kiểm tra đối chiếu với danh sách người dùng đã đăng ký (trong localStorage)
        var users = JSON.parse(localStorage.getItem("mini_users") || "[]");
        var matchedUser = users.find(function (u) {
          return u.email.toLowerCase() === email.toLowerCase() && u.password === password;
        });

        if (matchedUser) {
          localStorage.setItem("currentUser", JSON.stringify(matchedUser));
          
          // Đồng bộ thông tin hồ sơ cho trang taikhoan.html hiển thị chính xác
          var profileData = {
            name: matchedUser.name,
            email: matchedUser.email,
            phone: matchedUser.phone || "Chưa cập nhật",
            address: matchedUser.address || "Chưa cập nhật",
            join: matchedUser.join || "15/07/2026",
            bio: matchedUser.bio || "Khách hàng thân thiết của MiniShop."
          };
          localStorage.setItem("mini_profile", JSON.stringify(profileData));

          showToast("Đăng nhập tài khoản thành công!", "success");
          setTimeout(function () {
            window.location.href = "taikhoan.html";
          }, 1000);
        } else {
          showToast("Tài khoản hoặc mật khẩu không chính xác!", "error");
        }
      });

      updateCartCount();
    </script>
  </body>
</html>
