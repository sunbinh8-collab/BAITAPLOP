<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập - MiniShop</title>
    <link rel="stylesheet" href="css/minishop.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
      </div>
    </header>

    <main class="container">
      <div class="form-card">
        <h2>Đăng nhập</h2>
        <form id="loginForm">
          <div class="form-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="form-field">
            <label for="password">Mật khẩu</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              minlength="6"
            />
          </div>
          <div class="form-actions">
            <button class="btn primary" type="submit">Đăng nhập</button>
            <a class="small-link" href="dangky.html">Tạo tài khoản</a>
          </div>
        </form>
      </div>
    </main>

    <script src="js/common.js"></script>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          showToast(
            "Đăng nhập giả lập: " + document.getElementById("email").value,
            "success",
          );
          window.location.href = "taikhoan.html";
        });
    </script>
  </body>
</html>
