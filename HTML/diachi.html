<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Địa chỉ nhận hàng — MiniShop</title>
    <link rel="stylesheet" href="../CSS/caidat.css" />
    <link rel="stylesheet" href="../CSS/home.css" />
    <link rel="stylesheet" href="../CSS/diachi.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="../index.html">MiniShop<span>.</span></a>
        <nav class="main-nav">
          <a href="../index.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a class="active" href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <div class="header-actions">
          <a href="giohang.html" class="cart-btn" aria-label="Xem giỏ hàng">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-label">Giỏ hàng</span>
            <span id="cart-count" class="cart-badge">0</span>
          </a>
        </div>
      </div>
    </header>

    <main class="container address-page">
      <div class="address-card">
        <div class="address-header">
          <h2><i class="fa-solid fa-map-location-dot"></i> Địa chỉ nhận hàng</h2>
          <p class="subtitle">Quản lý địa chỉ giao hàng mặc định của bạn</p>
        </div>

        <!-- BỘ CHỌN LOẠI ĐỊA CHỈ: NHÀ RIÊNG / CÔNG TY -->
        <div class="address-type-selector">
          <button type="button" class="type-btn active" data-type="home">
            <i class="fa-solid fa-house"></i> Nhà riêng
          </button>
          <button type="button" class="type-btn" data-type="office">
            <i class="fa-solid fa-building"></i> Công ty
          </button>
        </div>

        <form id="addressForm" class="address-form">
          <div class="field-row">
            <div class="field">
              <label for="addrName">Họ và tên người nhận *</label>
              <input type="text" id="addrName" placeholder="Nguyễn Văn A" required />
            </div>
            <div class="field">
              <label for="addrPhone">Số điện thoại người nhận *</label>
              <input type="tel" id="addrPhone" placeholder="0901234567" required />
            </div>
          </div>

          <div class="field">
            <label for="addrDetail">Địa chỉ chi tiết *</label>
            <div class="address-input-group">
              <input type="text" id="addrDetail" placeholder="Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/TP" required />
              <button type="button" id="btnPreviewMap" class="btn-preview-map">
                <i class="fa-solid fa-map-location-dot"></i> Xem trên bản đồ
              </button>
            </div>
          </div>

          <!-- BẢN ĐỒ DỰ ĐỊNH GIAO HÀNG -->
          <div class="map-preview-card">
            <div class="map-header">
              <span><i class="fa-solid fa-map-pin"></i> Vị trí giao hàng</span>
              <small id="mapStatusText" class="muted">Đang định vị...</small>
            </div>
            <div class="map-wrapper">
              <iframe
                id="googleMapIframe"
                src="https://maps.google.com/maps?q=Ha%20Noi&t=&z=15&ie=UTF8&iwloc=&output=embed"
                width="100%"
                height="240"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
              </iframe>
            </div>
          </div>

          <div class="address-form-actions">
            <a href="taikhoan.html" class="btn secondary">Quay lại</a>
            <button type="submit" class="btn primary">
              <i class="fa-regular fa-floppy-disk"></i> Lưu địa chỉ
            </button>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>© MiniShop 2026</div>
      </div>
    </footer>

    <script src="../JS/diachi.js" defer></script>
  </body>
</html>
