<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sổ địa chỉ - MiniShop</title>
    <!-- Gọi link file CSS ngoài lùi 1 cấp ra thư mục css/ -->
    <link rel="stylesheet" href="../css/minishop.css" />
    <link rel="stylesheet" href="../css/diachi.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="trangchu.html">MiniShop</a>
        <nav class="main-nav">
          <a href="trangchu.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html" id="navLoginLink">Đăng nhập</a>
          <a href="dangky.html" id="navRegisterLink">Đăng ký</a>
          <a class="active" href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html" id="headerCartBtn">Giỏ (0)</a>
      </div>
    </header>

    <div id="addressModal" class="modal-overlay">
      <div class="address-modal" role="dialog" aria-modal="true">
        <div class="modal-title">Thêm địa chỉ nhận hàng mới</div>
        <form id="addressForm">
          <div class="form-group">
            <label for="fullName">Họ và tên người nhận</label>
            <input type="text" id="fullName" required placeholder="VD: Nguyễn Văn A" />
          </div>
          <div class="form-group">
            <label for="phone">Số điện thoại liên hệ</label>
            <input type="tel" id="phone" required placeholder="VD: 0912345678" />
          </div>
          <div class="form-group">
            <label for="fullAddress">Địa chỉ chi tiết</label>
            <textarea id="fullAddress" rows="3" required placeholder="Số nhà, tên đường, phường/xã, tỉnh/thành phố..."></textarea>
          </div>
          <div class="form-group">
            <label class="checkbox-group">
              <input type="checkbox" id="isDefault" /> Đặt làm địa chỉ mặc định
            </label>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn" id="btnCancel">Hủy bỏ</button>
            <button type="submit" class="btn primary">Lưu địa chỉ</button>
          </div>
        </form>
      </div>
    </div>

    <main class="container">
      <div class="account-wrap">
        <aside class="account-aside">
          <div class="aside-card">
            <nav>
              <a href="taikhoan.html" data-panel="profile">Hồ sơ cá nhân</a>
              <a href="hoadon.html" data-panel="orders">Đơn hàng của tôi</a>
              <a href="diachi.html" class="active" data-panel="addresses">Địa chỉ</a>
              <a href="phuongthucthanhtoan.html" data-panel="payments">Phương thức thanh toán</a>
              <a href="yeuthich.html" data-panel="favorites">Danh sách yêu thích</a>
              <a href="#" id="asideLogout" style="color: var(--primary-color);">Đăng xuất</a>
            </nav>
          </div>
        </aside>

        <section class="account-main">
          <div class="account-panel">
            <div class="panel-header">
              <h2>Địa chỉ nhận hàng</h2>
              <button class="btn primary" id="btnAddNewAddress">+ Thêm địa chỉ mới</button>
            </div>
            
            <div id="addressListContainer"></div>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer-bottom" style="border-top: 1px solid var(--border-color); margin-top: 30px; padding-top: 20px; text-align: center; color: var(--text-muted);">
      <div style="margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px;">
        © 2026 <span style="color: var(--primary-color); font-weight: 600;">MiniShop</span>. All rights reserved. Powered by HTML5 & CSS3.
      </div>
      <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
        <img src="../images/payment-methods.png" alt="Phương thức thanh toán" style="max-height: 24px; opacity: 0.6; filter: grayscale(100%);" onerror="this.style.display='none'">
      </div>
    </footer>

    <!-- Gọi link file điều hướng Javascript lùi 1 cấp ra thư mục js/ -->
    <script src="../js/diachi.js"></script>
  </body>
</html>
