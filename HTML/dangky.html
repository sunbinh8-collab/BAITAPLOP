<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Đăng ký — ShopQuanao</title>
    <link rel="stylesheet" href="../CSS/dangky.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <h2>Đăng ký</h2>
        <form id="registerForm" novalidate>
          <label class="field">
            <span>Họ và tên</span>
            <input type="text" id="name" name="name" required />
            <small class="error" data-for="name"></small>
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" id="email" name="email" required />
            <small class="error" data-for="email"></small>
          </label>

          <label class="field">
            <span>Mật khẩu</span>
            <input
              type="password"
              id="password"
              name="password"
              minlength="6"
              required
            />
            <small class="error" data-for="password"></small>
          </label>

          <label class="field">
            <span>Xác nhận mật khẩu</span>
            <input type="password" id="password2" name="password2" required />
            <small class="error" data-for="password2"></small>
          </label>

          <div class="actions">
            <button class="btn primary" type="submit">Tạo tài khoản</button>
            <div class="alt">
              Đã có tài khoản? <a href="dangnhap.html">Đăng nhập</a>
            </div>
          </div>
        </form>
      </div>
    </main>

    <script src="../JS/dangky.js"></script>
  </body>
</html>
