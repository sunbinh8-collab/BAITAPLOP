<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Gọi link file CSS ngoài lùi 1 cấp ra thư mục css/ -->
    <link rel="stylesheet" href="../css/minishop.css" />

  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">

          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="giohang.html">Giỏ hàng</a>
          <a href="dangnhap.html" id="navLoginLink">Đăng nhập</a>
          <a href="dangky.html" id="navRegisterLink">Đăng ký</a>
          <a class="active" href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <a class="cart-btn" href="giohang.html" id="headerCartBtn">Giỏ (0)</a>
      </div>
    </header>

    <main class="container">
      <div class="account-wrap">
        <aside class="account-aside">
          <div class="aside-card">
            <nav>
              <a href="taikhoan.html" data-panel="profile">Hồ sơ</a>

              <a href="#" id="asideLogout">Đăng xuất</a>
            </nav>
          </div>
        </aside>

        <section class="account-main">
          <div class="account-panel">
            <h2>Sản phẩm yêu thích</h2>
            <div id="favoritesList" class="favorites-grid"></div>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner" style="display:flex; justify-content:space-between; align-items:center; padding: 20px 0; color:var(--text-muted); font-size:0.9rem; border-top: 1px solid var(--border-color);">
        <div>© 2026 MiniShop. All rights reserved.</div>
      </div>
    </footer>

    <!-- Gọi link file điều hướng Javascript lùi 1 cấp ra thư mục js/ -->
