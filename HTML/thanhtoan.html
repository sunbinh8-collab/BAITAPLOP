<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thanh toán</title>
    <link rel="stylesheet" href="../CSS/caidat.css" />
    <link rel="stylesheet" href="../CSS/home.css" />
    <link rel="stylesheet" href="../CSS/thanhtoan.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="../index.html">MiniShop</a>
        <nav class="main-nav">
          <a href="../index.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
        <div class="header-actions"></div>
      </div>
    </header>

    <section class="hero hero-compact">
      <div class="container hero-inner">
        <p class="eyebrow">Thanh toán</p>
        <h1>Điền thông tin để hoàn tất đơn hàng</h1>
      </div>
    </section>

    <main class="container checkout-page">
      <div class="checkout-grid">
        <div class="checkout-card">
          <h2>Thông tin giao hàng</h2>
          <div class="field"><label>Họ và tên</label><input type="text" /></div>
          <div class="field">
            <label>Số điện thoại</label><input type="tel" />
          </div>
          <div class="field"><label>Địa chỉ</label><input type="text" /></div>
          <div class="field">
            <label>Phương thức vận chuyển</label
            ><select>
              <option>Giao hàng tiết kiệm</option>
              <option>Giao hàng nhanh</option>
            </select>
          </div>
          <a class="btn primary" href="phuongthucthanhtoan.html">Tiếp tục</a>
        </div>
        <div class="checkout-card">
          <h2>Tóm tắt</h2>
          <p class="muted">
            Đơn hàng sẽ được xử lý sau khi bạn xác nhận thanh toán.
          </p>
          <p><strong>Tổng tiền:</strong> 1.429.000₫</p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>© MiniShop — Thiết kế bởi bạn</div>
        <div>
          <a href="taikhoan.html">Tài khoản</a> •
          <a href="lienhe.html">Liên hệ</a>
        </div>
      </div>
    </footer>
  </body>
</html>
