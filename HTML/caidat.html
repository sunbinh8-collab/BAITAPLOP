<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cài đặt</title>
    <link rel="stylesheet" href="../CSS/caidat.css" />
    <link rel="stylesheet" href="../CSS/home.css" />
    <link rel="stylesheet" href="../CSS/taikhoan.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="../index.html">MiniShop</a>
        <nav class="main-nav">
          <a href="../index.html">Trang chủ</a>
          <a href="danhmucsanpham.html">Danh mục</a>
          <a href="taikhoan.html">Tài khoản</a>
          <a href="lienhe.html">Liên hệ</a>
        </nav>
      </div>
    </header>

    <main class="container" style="padding: 40px 20px 80px">
      <div class="account-grid">
        <section style="grid-column: 1/-1">
          <div class="tab-content">
            <h2>Cài đặt</h2>
            <h3>Đổi mật khẩu</h3>
            <form id="passwordForm">
              <label>Mật khẩu hiện tại</label>
              <input id="curPassword" type="password" />
              <label>Mật khẩu mới</label>
              <input id="newPassword" type="password" />
              <label>Nhập lại mật khẩu mới</label>
              <input id="confirmPassword" type="password" />
              <div style="margin-top: 12px">
                <button class="btn save" type="submit">
                  Cập nhật mật khẩu
                </button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>© MiniShop</div>
        <div class="muted">Liên hệ • Hỗ trợ</div>
      </div>
    </footer>

    <script src="../JS/caidat.js" defer></script>
  </body>
</html>
